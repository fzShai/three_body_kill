<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌌 三体杀 - 登录</title>
    <style>
        /* 重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 页面整体：夜幕向下渐变，右侧放置登录框 */
        body {
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
            font-weight: 600;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6vh 8vw;
            color: #e6f7ff;
            background: linear-gradient(to bottom, #071428 0%, #04151a 48%, #021012 100%);
        }

        /* 微小星星（铺满背景，左侧会有三颗独立闪烁的星）*/
        .stars{
            position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background-image:
                radial-gradient(circle at 10px 20px, rgba(255,255,255,0.9) 0 1px, transparent 2px),
                radial-gradient(circle at 40px 70px, rgba(255,255,255,0.8) 0 1px, transparent 2px),
                radial-gradient(circle at 50px 160px, rgba(255,255,255,0.7) 0 1px, transparent 2px),
                radial-gradient(circle at 90px 40px, rgba(255,255,255,0.6) 0 1px, transparent 2px),
                radial-gradient(circle at 130px 80px, rgba(255,255,255,0.9) 0 1px, transparent 2px);
            background-size: 220px 220px; opacity: 0.45; mix-blend-mode: screen;
        }

        /* 三颗可控漂移星（左侧），使用实际 DOM 元素，颜色为亮银色，中心更亮 */
        .drift-star{
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; display:block;
            transform: translate(-50%, -50%) scale(1);
            /* 进一步增强：更集中的白色核心、更大更亮的光晕 */
            background: radial-gradient(circle at 50% 45%, #ffffff 0%, #ffffff 34%, #f8fbff 46%, rgba(245,248,252,0.95) 60%, transparent 100%);
            box-shadow: 0 0 36px rgba(255,255,255,1), 0 0 86px rgba(220,235,245,0.36) inset, 0 0 160px rgba(210,230,245,0.2);
            opacity: 0.95; will-change: left, top, transform, opacity, filter;
            animation-name: flicker-yellow; animation-iteration-count: infinite; animation-timing-function: ease-in-out;
        }
        .drift-star:nth-of-type(1){ width:10px; height:10px; animation-duration: 2.6s; animation-delay: 0.2s; }
        .drift-star:nth-of-type(2){ width:7px; height:7px; animation-duration: 3.6s; animation-delay: 0.6s; }
        .drift-star:nth-of-type(3){ width:12px; height:12px; animation-duration: 4.2s; animation-delay: 1s; }

        @keyframes flicker-yellow {
            0% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            40% { opacity: 1; transform: translate(-50%, -50%) scale(1.9); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(2.0); }
            60% { opacity: 0.95; transform: translate(-50%, -50%) scale(1.12); }
            100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
        }

        /* 拖尾粒子 */
        .star-trail{
            position: fixed; pointer-events: none; z-index: 0;
            /* 长条渐变，尾部逐渐透明，制造彗尾感 */
            background: linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(230,235,245,0.75) 30%, rgba(200,210,225,0.35) 60%, transparent 100%);
            border-radius: 999px;
            mix-blend-mode: screen; filter: blur(6px);
            opacity: 0.85; transform-origin: center left;
            transition: transform 720ms cubic-bezier(.2,.8,.2,1), opacity 720ms linear;
            will-change: transform, opacity;

        }

        /* 保持原有 .drift-star 视觉与行为（使用脚本控制移动与亮度） */

        /* 过渡雾气层：淡淡光晕，放在星空与森林之间，增加层次感 */
        .mist{
            position: fixed; left: 0; right: 0; bottom: 0; height: 52vh; width: 100%; z-index: 1; pointer-events: none;
            background: radial-gradient(60% 40% at 20% 30%, rgba(2,40,50,0.28), rgba(2,20,30,0.12) 30%, transparent 70%),
                        radial-gradient(40% 30% at 60% 60%, rgba(6,30,40,0.18), transparent 60%);
            filter: blur(18px) saturate(120%);
            opacity: 0.85; mix-blend-mode: screen;
            animation: drift 18s linear infinite;
        }

        @keyframes drift{
            0%{ transform: translateX(-6%); }
            50%{ transform: translateX(6%); }
            100%{ transform: translateX(-6%); }
        }

        /* 森林剪影：改为内联 SVG（更尖锐的松树轮廓），放置在页面底部 */
        .forest{
            position: fixed; left: 0; right: 0; bottom: 0; height: 44vh; width: 100%; z-index: 2; pointer-events: none;
            display: block; transform: translateZ(0);
        }
        .forest svg{ width:100%; height:100%; display:block; }
        /* 近景更深，远景更淡，保持夜色氛围 */
        .forest .layer-far{ fill: rgba(6,12,10,0.55); }
        .forest .layer-mid{ fill: rgba(3,6,5,0.75); }
        .forest .layer-near{ fill: rgba(0,0,0,0.95); }

        /* Tree sway animations */
        @keyframes tree-sway-near {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(3px); }
            60% { transform: translateX(-2.5px); }
        }
        @keyframes tree-sway-mid {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(1.5px); }
            65% { transform: translateX(-1px); }
        }
        .tree-layer-mid{
            animation: tree-sway-mid 6.5s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .tree-layer-near{
            animation: tree-sway-near 4.2s ease-in-out infinite;
            transform-origin: center bottom;
        }
        .tree-phase-1{ animation-delay: -0.6s; }
        .tree-phase-2{ animation-delay: -1.8s; }
        .tree-phase-3{ animation-delay: -3.0s; }

        /* Fireflies canvas */
        #firefliesCanvas{
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 44vh;
            width: 100%;
            z-index: 2;
            pointer-events: none;
            display: block;
            opacity: 0.85;
        }
        body.scene-transition-start #firefliesCanvas{
            transition: opacity 2s ease;
            opacity: 0;
        }


        /* 转场层：太阳与火焰覆盖层 */
        .transition-layer{
            position: fixed;
            inset: 0;
            z-index: 2.5;
            pointer-events: none;
            overflow: hidden;
        }
        #fireCanvas{
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 44vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .solar-rise{
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .sun{
            position: absolute;
            bottom: 0;
            width: 30vh;
            height: 30vh;
            border-radius: 50%;
            transform: translate(-50%, 100%) scale(0.2);
            opacity: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,238,176,0.95) 0%, #ffcc44 18%, #ff8833 45%, #ff5a05 85%, transparent 100%);
            box-shadow: 0 0 60px rgba(255, 154, 33, 0.35), inset 0 0 18px rgba(255, 215, 128, 0.5);
            filter: blur(0.4px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .sun-1{ left: 28%; width: 26vh; height: 26vh; }
        .sun-2{ left: 72%; width: 28vh; height: 28vh; }
        .sun-3{ left: 50%; width: 34vh; height: 34vh; }
        .sun-rise-active .sun{
            animation-name: sun-rise;
            animation-duration: 3.5s;
            animation-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1);
            animation-fill-mode: forwards;
        }
        .sun-rise-active .sun-1{ animation-delay: 0.2s; }
        .sun-rise-active .sun-2{ animation-delay: 0.4s; }
        .sun-rise-active .sun-3{ animation-delay: 0.6s; }
        .sun.pulse{
            animation: sun-pulse 4.5s ease-in-out infinite;
        }
        @keyframes sun-rise {
            0% { transform: translate(-50%, 100%) scale(0.2); opacity: 0; }
            65% { transform: translate(-50%, -35%) scale(1.08); opacity: 1; }
            100% { transform: translate(-50%, -35%) scale(1); opacity: 1; }
        }
        @keyframes sun-pulse {
            0%,100% { transform: translate(-50%, -35%) scale(1); filter: blur(0.4px); box-shadow: 0 0 60px rgba(255, 154, 33, 0.35), inset 0 0 18px rgba(255, 215, 128, 0.5); }
            50% { transform: translate(-50%, -35%) scale(1.05); filter: blur(0.6px); box-shadow: 0 0 72px rgba(255, 174, 51, 0.5), inset 0 0 24px rgba(255, 230, 160, 0.55); }
        }
        body.scene-transition-start .drift-star{
            animation-play-state: paused;
            transition: filter 0.4s ease, opacity 2s ease;
        }
        body.scene-transition-start .container{ opacity: 0; transition: opacity 1s ease; }
        body.scene-transition-sky{
            background: linear-gradient(to bottom, #f5d6b3 0%, #f3c689 48%, #e9b16d 100%);
            transition: background 3s ease-in-out;
        }
        body.scene-transition-sky .stars{ opacity: 0; transition: opacity 3s ease-in-out 0.2s; }
        .forest svg path,
        .forest svg g path,
        .forest svg g ellipse{
            transition: fill 4.5s ease-in-out;
        }
        body.scene-transition-sky .layer-far{ fill: #ff7b30; }
        body.scene-transition-sky .layer-mid{ fill: #d84a1e; }
        body.scene-transition-sky .layer-near{ fill: #7f1204; }
        .forest-burning-active #fireCanvas{ opacity: 1; }

        /* 登录框：右侧，硬边科幻风格 + 激光边框 */
        .container{
            position: relative;
            z-index: 3;
            width: 100%; max-width: 420px;
            margin-right: 6vw;
            padding: 40px 36px;
            border-radius: 0;
            background: rgba(8, 14, 20, 0.08);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid rgba(0,200,255,0.32);
            box-shadow: 0 0 30px rgba(0,180,220,0.16), inset 0 0 1px rgba(0,230,255,0.12), inset 0 0 20px rgba(0,150,200,0.04);
            overflow: visible;
        }
        /* 激光边框发光效果 */
        .container::before{
            content: '';
            position: absolute; inset: -2px; border-radius: 0; z-index: -1;
            background: linear-gradient(90deg, rgba(0,200,255,0.2), rgba(0,150,220,0.1), rgba(0,200,255,0.2));
            filter: blur(8px);
            opacity: 0.6;
            animation: laser-glow 3s ease-in-out infinite;
        }

        @keyframes laser-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .title{ font-size: 30px; font-weight: 900; letter-spacing: 2px; text-align: left; color: #7fd9ff; }
        .subtitle{ font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 20px; text-align: left; }

        .tabs{ display:flex; gap:8px; margin-bottom:18px; }
        .tabs button{ flex: none; padding:8px 14px; border-radius:0; border:1px solid rgba(0,200,255,0.12); background: rgba(0,150,200,0.04); color: rgba(150,200,230,0.8); cursor:pointer; font-weight:700; transition: all 0.2s; }
        .tabs button.active{ background: rgba(0,200,255,0.12); color: #a8d8ff; border-color: rgba(0,200,255,0.24); }
        .tabs button:hover{ border-color: rgba(0,200,255,0.2); }

        .form-panel{ display: none; flex-direction: column; gap:14px; }
        .form-panel.active{ display:flex; }
        .form-panel label{ font-size:13px; color: rgba(180,200,220,0.8); font-weight: 600; }
        /* 输入框：直角、细直线边框 */
        .form-panel input{
            padding:12px 14px; border-radius:0; border:1px solid rgba(0,180,220,0.16);
            background: rgba(0,50,80,0.3); color:#b8d8ff; font-size:15px; outline:none; font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-panel input:focus{
            box-shadow: 0 0 12px rgba(0,180,220,0.12), inset 0 0 1px rgba(0,200,255,0.16);
            border-color: rgba(0,200,255,0.28);
            background: rgba(0,80,120,0.25);
        }
        .form-panel input::placeholder{ color: rgba(150,180,210,0.4); }

        .password-row{ position: relative; }
        .password-row input{ width:100%; padding-right:46px; }
        .password-toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; border:none; color: #7fa8d8; cursor:pointer; font-size:20px; font-weight: 700; letter-spacing: -2px; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .password-toggle.hidden::after{ content: ''; position: absolute; width: 3px; height: 32px; background: currentColor; transform: rotate(-45deg); }

        .form-panel button{ padding:12px; border-radius:0; border:1px solid rgba(0,180,220,0.24); background: rgba(0,150,200,0.24); color:#a8d8ff; font-weight:800; cursor:pointer; transition: all 0.2s; }
        .form-panel button:hover{ background: rgba(0,180,220,0.32); border-color: rgba(0,200,255,0.32); box-shadow: 0 0 12px rgba(0,150,200,0.12); }

        .message{ text-align:left; font-size:14px; margin-top:8px; min-height:20px; color: rgba(160,180,200,0.8); }
        .message.success{ color:#6ad8ff; }
        .message.error{ color:#ff8888; }

        .hint-text{ font-size:13px; color: rgba(140,170,200,0.5); text-align:left; margin-top:6px; }

        /* 面板角标：小装饰线条，增加科幻感 */
        .panel-badge{
            position: absolute; top: 12px; left: 12px; width: 44px; height: 20px; z-index: 6; pointer-events: none;
            display: flex; gap:6px; align-items:center;
        }
        .panel-badge .bar{ height:1px; background: rgba(0,200,255,0.2); box-shadow: 0 0 8px rgba(0,180,220,0.08); border-radius:0; }
        .panel-badge .bar.short{ width:12px; opacity:0.9; }
        .panel-badge .bar.long{ width:28px; opacity:0.7; }
        /* 小角标右下：微小矩形装饰线 */
        .panel-badge::after{ content: ''; position: absolute; right:-8px; bottom:-6px; width:8px; height:8px; border-radius:0; background: rgba(0,180,220,0.16); box-shadow: 0 0 6px rgba(0,150,200,0.08); }

        /* 响应式：窄屏居中显示，调整星星位置避免重叠 */
        @media (max-width: 900px){
            body{ justify-content:center; padding:6vh 6vw; }
            .container{ margin:0; max-width:460px; }
            /* 在窄屏上分别调整三颗漂移星的位置并略微缩小，避免挤在一起 */
            .drift-star:nth-of-type(1){ left: 10vw !important; top: 18vh !important; transform: translate(-50%,-50%) scale(0.8) !important; }
            .drift-star:nth-of-type(2){ left: 6vw  !important; top: 30vh !important; transform: translate(-50%,-50%) scale(0.8) !important; }
            .drift-star:nth-of-type(3){ left: 14vw !important; top: 40vh !important; transform: translate(-50%,-50%) scale(0.9) !important; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="drift-star" data-l="8vw" data-t="20vh" aria-hidden="true"></div>
        <div class="drift-star" data-l="6vw" data-t="34vh" aria-hidden="true"></div>
        <div class="drift-star" data-l="11vw" data-t="46vh" aria-hidden="true"></div>
    </div>
    <!-- 过渡雾气层，位于星空与森林之间 -->
    <div class="mist" aria-hidden="true"></div>
    <!-- 内联 SVG 森林剪影（AI 生成） -->
    <div class="forest" aria-hidden="true">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" id="forestSvg">
            <path class="layer-far" d="M0,200 C80,160 160,180 240,152 C320,124 400,160 480,148 C560,136 640,176 720,152 C800,128 880,156 960,140 C1040,124 1120,160 1200,148 C1280,136 1360,160 1440,140 L1440,320 L0,320 Z" />
            <g class="layer-mid tree-layer-mid" id="midTrees"></g>
            <g class="layer-near tree-layer-near" id="nearTrees"></g>
        </svg>
    </div>
    <canvas id="firefliesCanvas" aria-hidden="true"></canvas>
    <div class="transition-layer" aria-hidden="true">
        <canvas id="fireCanvas"></canvas>
        <div class="solar-rise" id="solarRise">
            <div class="sun sun-1"></div>
            <div class="sun sun-2"></div>
            <div class="sun sun-3"></div>
            
        </div>
    </div>
    <div class="container">
        <div class="panel-badge" aria-hidden="true">
            <div class="bar short"></div>
            <div class="bar long"></div>
        </div>
        <div class="title">三体杀</div>
        <div class="subtitle">✦ 黑暗森林 · 在线对决 ✦</div>

        <div class="tabs">
            <button id="loginTab" class="active">登录</button>
            <button id="registerTab">注册</button>
        </div>

        <!-- 登录面板 -->
        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="loginPassword" placeholder="输入密码" />
                <button type="button" class="password-toggle" data-target="loginPassword" aria-label="显示密码">👁</button>
            </div>
            <button id="loginBtn">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <!-- 注册面板 -->
        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
                <button type="button" class="password-toggle" data-target="regPassword" aria-label="显示密码">👁</button>
            </div>
            <label>确认密码</label>
            <div class="password-row">
                <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
                <button type="button" class="password-toggle" data-target="regPasswordConfirm" aria-label="显示密码">👁</button>
            </div>
            <button id="registerBtn">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const messageEl = document.getElementById('message');

        // Tab 切换
        document.getElementById('loginTab').addEventListener('click', () => {
            setTab('login');
        });
        document.getElementById('registerTab').addEventListener('click', () => {
            setTab('register');
        });

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        // 登录
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await doRequest('/api/login', username, password, '登录成功！');
        });

        // 注册
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();

            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }

            const btn = url === '/api/login' ?
                document.getElementById('loginBtn') :
                document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        // ✅ 登录成功：优先使用服务端返回的 username，确保和后端保持一致
                        const loginUsername = data.username || username;
                        localStorage.setItem('username', loginUsername);
                        setAuthCookie(loginUsername);
                        startSceneTransition(loginUsername);
                    } else {
                        // ✅ 注册成功：清空注册表单，切到登录面板
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function setAuthCookie(username) {
            // 说明：当前使用前端 JS 设置 Cookie，适合演示和开发调试。
            // 若后续要提升安全性，建议改为由后端在登录成功时通过 Set-Cookie 响应头设置 HttpOnly Cookie。
            document.cookie = `username=${encodeURIComponent(username)}; path=/; max-age=3600; SameSite=Lax`;
        }

        document.querySelectorAll('.password-toggle').forEach((button) => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                if (isPassword) {
                    button.classList.remove('hidden');
                    button.setAttribute('aria-label', '隐藏密码');
                } else {
                    button.classList.add('hidden');
                    button.setAttribute('aria-label', '显示密码');
                }
            });
        });

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        function startSceneTransition(username) {
            document.body.classList.add('scene-transition-start');
            document.querySelector('.container')?.setAttribute('aria-hidden', 'true');
            setTimeout(() => {
                if (window.startStarDrop) window.startStarDrop();
            }, 0);
            setTimeout(() => {
                document.getElementById('solarRise')?.classList.add('sun-rise-active');
            }, 3000);
            setTimeout(() => {
                document.body.classList.add('scene-transition-sky');
            }, 4200);
            setTimeout(() => {
                document.querySelectorAll('.sun').forEach((el) => el.classList.add('pulse'));
            }, 7000);
            setTimeout(() => {
                document.body.classList.add('forest-burning-active');
                if (window.startFire) window.startFire();
            }, 5000);
            setTimeout(() => {
                if (window.stopFire) window.stopFire();
            }, 11000);
            setTimeout(() => {
                window.location.href = '/lobby';
            }, 11500);
        }

        // 按回车键触发登录/注册
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        // ✅ 如果已经登录过，自动跳转到大厅
        const savedUser = localStorage.getItem('username');
        const cookieUser = document.cookie
            .split(';')
            .map(c => c.trim())
            .find(c => c.startsWith('username='));

        let cookieUsername = '';
        if (cookieUser) {
            try {
                cookieUsername = decodeURIComponent(cookieUser.split('=').slice(1).join('='));
            } catch (err) {
                cookieUsername = '';
            }
        }

        if (savedUser && savedUser === cookieUsername) {
            window.location.href = '/lobby';
        } else if (savedUser && savedUser !== cookieUsername) {
            localStorage.removeItem('username');
        }
    </script>
    <script>
        /* Star drift: 改为在登录框左侧区域内移动，速度与亮度随机化 */
        (function(){
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            if(!stars.length) return;

            const container = document.querySelector('.container');
            const vw = ()=> window.innerWidth / 100;
            const vh = ()=> window.innerHeight / 100;
            function rand(min,max){ return Math.random()*(max-min)+min; }

            // 初始化位置并设置随机亮度与初始速度相关参数
            stars.forEach((el)=>{
                const l = el.getAttribute('data-l') || '8vw';
                const t = el.getAttribute('data-t') || '20vh';
                el.style.left = l;
                el.style.top = t;
                el.style.position = 'fixed';
                // 随机亮度（进一步提高上限以显著增强中心光）
                const brightness = rand(1.8, 4.0);
                el.style.filter = `brightness(${brightness})`;                el.dataset.baseBrightness = brightness;                // 随机透明度（更高的基础可见度）
                el.style.opacity = String(rand(0.75, 1));
                // 根据亮度放大发光效果（更强的冷白光晕）
                const glowFactor = Math.max(1, brightness);
                el.style.boxShadow = `0 0 ${18 * glowFactor}px rgba(255,255,255,1), 0 0 ${64 * glowFactor}px rgba(220,235,245,0.4), 0 0 ${160 * glowFactor}px rgba(210,230,245,0.22) inset`;
            });

            class Walker{
                constructor(el){
                    this.el = el;
                    // 计算水平移动边界：从页面左侧约 2vw 到登录框左侧 - 60px
                    this.minX = Math.max(2 * vw(), 8);
                    const containerLeft = container ? container.getBoundingClientRect().left : window.innerWidth - 140;
                    this.maxX = Math.max(this.minX + 20, containerLeft - 60);
                    // 垂直范围在视口内自由移动
                    this.minY = 6 * vh();
                    this.maxY = 88 * vh();

                    this.resetBase();
                    // 每颗星随机化速度区间（ms）
                    this.durationMin = rand(2000, 4500);
                    this.durationMax = rand(5000, 14000);
                    this.lastTrail = 0;
                    this.trailInterval = rand(60, 140);
                    this.setNewTarget();
                }
                resetBase(){
                    const cs = getComputedStyle(this.el);
                    this.baseX = parseFloat(cs.left);
                    this.baseY = parseFloat(cs.top);
                    // 保证基础位置在边界内
                    if(this.baseX < this.minX) this.baseX = this.minX + rand(0, 10);
                    if(this.baseX > this.maxX) this.baseX = this.maxX - rand(0, 10);
                    if(this.baseY < this.minY) this.baseY = this.minY + rand(0, 10);
                    if(this.baseY > this.maxY) this.baseY = this.maxY - rand(0, 10);
                }
                setNewTarget(){
                    this.startX = this.baseX;
                    this.startY = this.baseY;
                    this.targetX = rand(this.minX, this.maxX);
                    this.targetY = rand(this.minY, this.maxY);
                    this.duration = rand(this.durationMin, this.durationMax);
                    this.startTime = 0;
                }
                step(ts){
                    if(!this.startTime) this.startTime = ts;
                    if(this.dropMode){
                        const t = Math.min((ts - this.startTime) / this.duration, 1);
                        const ease = t * t;
                        const curY = this.startY + (this.targetY - this.startY) * ease;
                        this.el.style.left = this.startX + 'px';
                        this.el.style.top = curY + 'px';
                        this.el.style.opacity = String(Math.max(0, 1 - t));
                        if(t >= 1){
                            this.el.style.opacity = '0';
                        }
                        return;
                    }
                    const t = Math.min((ts - this.startTime) / this.duration, 1);
                    const ease = t<0.5 ? 2*t*t : -1 + (4-2*t)*t;
                    const curX = this.startX + (this.targetX - this.startX) * ease;
                    const curY = this.startY + (this.targetY - this.startY) * ease;
                    this.el.style.left = curX + 'px';
                    this.el.style.top = curY + 'px';
                    const now = performance.now();
                    // 拖尾已禁用（按用户要求移除）

                    if(t >= 1){
                        // 每次完成一次移动后微调亮度和速度区间，制造更随机的视觉效果
                        const brightness = rand(2.2, 5.0);
                        this.el.style.filter = `brightness(${brightness})`;
                        this.el.style.opacity = String(rand(0.8, 1));
                        const glowFactor = Math.max(1, brightness);
                        this.el.style.boxShadow = `0 0 ${24 * glowFactor}px rgba(255,255,255,1), 0 0 ${96 * glowFactor}px rgba(220,235,245,0.44), 0 0 ${192 * glowFactor}px rgba(210,230,245,0.24) inset`;
                        this.durationMin = rand(1800, 5000);
                        this.durationMax = rand(4000, 16000);
                        this.baseX = curX;
                        this.baseY = curY;
                        this.setNewTarget();
                    }
                }
            }

            let walkers = stars.map(s => new Walker(s));
            let starDropStarted = false;

            function startStarDrop() {
                if (starDropStarted) return;
                starDropStarted = true;
                walkers.forEach((walker) => {
                    const cs = getComputedStyle(walker.el);
                    const currentX = parseFloat(cs.left);
                    const currentY = parseFloat(cs.top);
                    walker.startX = currentX;
                    walker.startY = currentY;
                    walker.targetX = currentX;
                    walker.targetY = window.innerHeight + 100;
                    walker.duration = 2200;
                    walker.startTime = 0;
                    walker.dropMode = true;
                    const base = parseFloat(walker.el.dataset.baseBrightness) || 1;
                    walker.el.style.filter = `brightness(${base * 2})`;
                });
            }
            window.startStarDrop = startStarDrop;

            function onResize(){
                // 重新从 data 属性重置位置，并重建 walkers（以重新计算 container 的位置）
                stars.forEach(s=>{
                    const l = s.getAttribute('data-l') || '8vw';
                    const t = s.getAttribute('data-t') || '20vh';
                    s.style.left = l; s.style.top = t;
                });
                walkers = stars.map(s => new Walker(s));
            }

            // 拖尾函数已移除（用户请求取消拖尾）

            window.addEventListener('resize', onResize);

            function loop(ts){
                walkers.forEach(w => w.step(ts));
                requestAnimationFrame(loop);
            }

            requestAnimationFrame(loop);
        })();
    </script>
    <script>
        (function(){
            const canvas = document.getElementById('fireCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = 0;
            let height = 0;
            let rafId = null;
            let lastTime = 0;
            let running = false;
            const particles = [];
            const pool = [];
            let fireIntensity = 0;

            function rand(min, max){ return Math.random() * (max - min) + min; }

            function resizeCanvas(){
                const rect = canvas.getBoundingClientRect();
                width = rect.width;
                height = rect.height;
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function createParticle(){
                if (particles.length >= 220) return null;
                const p = pool.pop() || {};
                p.x = rand(0, width);
                p.y = height - rand(6, 18);
                p.vx = rand(-0.3, 0.3);
                p.vy = -rand(0.7, 2.1);
                p.size = rand(4, 16);
                p.age = 0;
                p.life = rand(1.8, 2.8);
                p.alpha = 1;
                p.drift = rand(-0.25, 0.25);
                return p;
            }

            function updateParticles(dt){
                const rate = 45 + fireIntensity * 20;
                const spawn = Math.round(rate * dt);
                for (let i = 0; i < spawn; i++) {
                    const particle = createParticle();
                    if (particle) particles.push(particle);
                }
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.age += dt;
                    p.vy += 0.08 * dt;
                    p.x += (p.vx + p.drift * (0.6 + fireIntensity * 0.8)) * 12;
                    p.y += p.vy * 12;
                    p.alpha = Math.max(0, 1 - p.age / p.life);
                    if (p.age >= p.life || p.y < -40 || p.alpha <= 0) {
                        particles.splice(i, 1);
                        pool.push(p);
                    }
                }
            }

            function drawParticle(p){
                const progress = p.age / p.life;
                const radius = p.size * (0.8 + progress * 1.4);
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
                grad.addColorStop(0, `rgba(255, 236, 128, ${p.alpha})`);
                grad.addColorStop(0.3, `rgba(255, 136, 0, ${p.alpha * 0.8})`);
                grad.addColorStop(0.6, `rgba(255, 68, 0, ${p.alpha * 0.35})`);
                grad.addColorStop(1, `rgba(255, 68, 0, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }

            function render(){
                ctx.clearRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'lighter';
                particles.forEach(drawParticle);
                ctx.globalCompositeOperation = 'source-over';
            }

            function loopFire(ts){
                if (!running) return;
                if (!lastTime) lastTime = ts;
                const dt = Math.min((ts - lastTime) / 1000, 0.033);
                lastTime = ts;
                updateParticles(dt);
                render();
                rafId = requestAnimationFrame(loopFire);
            }

            function startFire(){
                if (running) return;
                running = true;
                fireIntensity = 0;
                resizeCanvas();
                lastTime = 0;
                const start = performance.now();
                const ramp = (time) => {
                    const elapsed = time - start;
                    fireIntensity = Math.min(1, elapsed / 3000);
                    if (fireIntensity < 1) requestAnimationFrame(ramp);
                };
                requestAnimationFrame(ramp);
                rafId = requestAnimationFrame(loopFire);
            }

            function stopFire(){
                running = false;
                if (rafId) cancelAnimationFrame(rafId);
                ctx.clearRect(0, 0, width, height);
                particles.length = 0;
                pool.length = 0;
            }

            window.startFire = startFire;
            window.stopFire = stopFire;
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        })();
    </script>
    <script>
        (function(){
            // ============================================================
            // 1. Procedural Tree Generation
            // ============================================================
            function initForest() {
                var svg = document.getElementById('forestSvg');
                if (!svg) return;
                var midGroup = document.getElementById('midTrees');
                var nearGroup = document.getElementById('nearTrees');
                if (!midGroup || !nearGroup) return;

                var W = 1440, H = 320;
                var NS = 'http://www.w3.org/2000/svg';

                // Seeded RNG
                function seededRandom(seed) {
                    var s = seed >>> 0;
                    return function() {
                        s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
                        return (s >>> 0) / 4294967296;
                    };
                }

                // Create a broadleaf tree (overlapping ellipses)
                function createBroadleaf(group, cx, baseY, h, w, rng, className) {
                    var r = rng;
                    var trunkH = h * (0.18 + r() * 0.08);
                    var trunkW = w * 0.07;
                    var crownBase = baseY - trunkH;
                    var crownH = h - trunkH;

                    // Trunk (tilted slightly)
                    var trunk = document.createElementNS(NS, 'path');
                    var tilt = (r() - 0.5) * 2;
                    var d = 'M' + (cx - trunkW/2 + tilt) + ' ' + baseY +
                            'L' + (cx - trunkW*0.35 + tilt*0.6) + ' ' + (crownBase + 2) +
                            'L' + (cx + trunkW*0.35 - tilt*0.6) + ' ' + (crownBase + 2) +
                            'L' + (cx + trunkW/2 - tilt) + ' ' + baseY + 'Z';
                    trunk.setAttribute('d', d);
                    trunk.setAttribute('class', className);
                    group.appendChild(trunk);

                    // Foliage: overlapping ellipses forming an irregular crown
                    var numClusters = 3 + Math.floor(r() * 4);
                    for (var i = 0; i < numClusters; i++) {
                        var el = document.createElementNS(NS, 'ellipse');
                        var ox = (r() - 0.5) * w * 0.8;
                        var oy = -(0.15 + r() * 0.55) * crownH;
                        var rx = w * (0.12 + r() * 0.18);
                        var ry = crownH * (0.12 + r() * 0.22);
                        el.setAttribute('cx', cx + ox);
                        el.setAttribute('cy', crownBase + oy);
                        el.setAttribute('rx', Math.max(rx, 3));
                        el.setAttribute('ry', Math.max(ry, 3));
                        el.setAttribute('class', className);
                        group.appendChild(el);
                    }

                    // Small branch protrusions (thin filled paths)
                    var numBranches = 1 + Math.floor(r() * 2);
                    for (var i = 0; i < numBranches; i++) {
                        var br = document.createElementNS(NS, 'path');
                        var side = r() > 0.5 ? 1 : -1;
                        var by = crownBase - (0.15 + r() * 0.3) * crownH;
                        var bx = cx + side * w * 0.25;
                        var ex = cx + side * w * (0.35 + r() * 0.15);
                        var ey = by - (0.05 + r() * 0.1) * crownH;
                        var cpx = (bx + ex) / 2;
                        var cpy = (by + ey) / 2 - crownH * 0.06;
                        br.setAttribute('d', 'M' + bx + ' ' + by + ' Q' + cpx + ' ' + cpy + ' ' + ex + ' ' + ey);
                        br.setAttribute('class', className);
                        br.setAttribute('fill', 'none');
                        br.setAttribute('stroke', 'currentColor');
                        br.setAttribute('stroke-width', '1.8');
                        group.appendChild(br);
                    }
                }

                // Create a conifer/pine tree (tiered pointed shapes)
                function createConifer(group, cx, baseY, h, w, rng, className) {
                    var r = rng;
                    var trunkH = h * 0.08;
                    var trunkW = w * 0.05;
                    var crownBase = baseY - trunkH;
                    var crownH = h - trunkH;

                    // Trunk
                    var trunk = document.createElementNS(NS, 'path');
                    var d = 'M' + (cx - trunkW/2) + ' ' + baseY +
                            'L' + (cx - trunkW*0.3) + ' ' + (crownBase + 1) +
                            'L' + (cx + trunkW*0.3) + ' ' + (crownBase + 1) +
                            'L' + (cx + trunkW/2) + ' ' + baseY + 'Z';
                    trunk.setAttribute('d', d);
                    trunk.setAttribute('class', className);
                    group.appendChild(trunk);

                    // Tiered foliage
                    var numTiers = 3 + Math.floor(r() * 3);
                    for (var i = 0; i < numTiers; i++) {
                        var t = i / numTiers;
                        var tierBaseY = crownBase - crownH * t * 0.75;
                        var tierH = crownH * (0.25 + r() * 0.08);
                        var tierW = w * 0.45 * (1 - t * 0.55);
                        tierW = Math.max(tierW, w * 0.08);

                        var poly = document.createElementNS(NS, 'path');
                        var px = cx - tierW/2 + (r() - 0.5) * tierW * 0.1;
                        var py = tierBaseY;
                        var ptopx = cx + (r() - 0.5) * w * 0.04;
                        var ptopy = tierBaseY - tierH;
                        var pxx = cx + tierW/2 + (r() - 0.5) * tierW * 0.1;
                        var pathD = 'M' + px + ' ' + py +
                                    ' Q' + ((px + ptopx)/2 + (r()-0.5)*5) + ' ' + ((py + ptopy)/2 + 3) +
                                    ' ' + ptopx + ' ' + ptopy +
                                    ' Q' + ((ptopx + pxx)/2 + (r()-0.5)*5) + ' ' + ((py + ptopy)/2 + 3) +
                                    ' ' + pxx + ' ' + py + 'Z';
                        poly.setAttribute('d', pathD);
                        poly.setAttribute('class', className);
                        group.appendChild(poly);
                    }
                }

                // Mid layer: distant, smaller trees
                var midRng = seededRandom(42);
                for (var i = 0; i < 22; i++) {
                    var cx = 20 + midRng() * (W - 40);
                    var cy = 265 + midRng() * 25;
                    var h = 50 + midRng() * 55;
                    var w = 16 + midRng() * 22;
                    if (midRng() > 0.45) {
                        createBroadleaf(midGroup, cx, cy, h, w, midRng, 'layer-mid');
                    } else {
                        createConifer(midGroup, cx, cy, h, w, midRng, 'layer-mid');
                    }
                }

                // Near layer: larger, more detailed trees
                var nearRng = seededRandom(137);
                for (var i = 0; i < 16; i++) {
                    var cx = 20 + nearRng() * (W - 40);
                    var cy = 285 + nearRng() * 25;
                    var h = 90 + nearRng() * 85;
                    var w = 28 + nearRng() * 32;
                    if (nearRng() > 0.4) {
                        createBroadleaf(nearGroup, cx, cy, h, w, nearRng, 'layer-near');
                    } else {
                        createConifer(nearGroup, cx, cy, h, w, nearRng, 'layer-near');
                    }
                }
            }

            // ============================================================
            // 2. Firefly Particle System
            // ============================================================
            function initFireflies() {
                var canvas = document.getElementById('firefliesCanvas');
                if (!canvas) return;
                var ctx = canvas.getContext('2d');
                var W, H, dpr, running = true, rafId = null;
                var fireflies = [];
                var NUM = 30;

                function resize() {
                    var rect = canvas.getBoundingClientRect();
                    W = rect.width;
                    H = rect.height;
                    dpr = window.devicePixelRatio || 1;
                    canvas.width = Math.round(W * dpr);
                    canvas.height = Math.round(H * dpr);
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                }

                function rand(min, max) { return Math.random() * (max - min) + min; }

                function createFirefly() {
                    return {
                        x: rand(0, W),
                        y: rand(H * 0.1, H * 0.85),
                        vx: rand(-0.15, 0.15),
                        vy: rand(-0.1, -0.02),
                        size: rand(1.5, 4.5),
                        phase: rand(0, Math.PI * 2),
                        speed: rand(0.3, 0.8),
                        glow: 0.4 + Math.random() * 0.6,
                        hue: 45 + rand(0, 50),   // 45-95: warm yellow to greenish
                        sat: 80 + rand(0, 20),
                        life: 0.7 + rand(0, 0.3),
                        driftAngle: rand(0, Math.PI * 2),
                        driftSpeed: rand(0.02, 0.06)
                    };
                }

                function update() {
                    for (var i = 0; i < fireflies.length; i++) {
                        var f = fireflies[i];
                        // Gentle random walk
                        f.driftAngle += (Math.random() - 0.5) * 0.3;
                        f.vx += Math.cos(f.driftAngle) * 0.003;
                        f.vy += Math.sin(f.driftAngle) * 0.002;
                        // Damping
                        f.vx *= 0.99;
                        f.vy *= 0.99;
                        f.x += f.vx;
                        f.y += f.vy;
                        // Keep in bounds with soft bounce
                        if (f.x < -10) f.x = W + 10;
                        if (f.x > W + 10) f.x = -10;
                        if (f.y < H * 0.05) f.y = H * 0.85;
                        if (f.y > H * 0.95) f.y = H * 0.1;
                    }
                }

                function draw(time) {
                    ctx.clearRect(0, 0, W, H);
                    ctx.globalCompositeOperation = 'lighter';

                    for (var i = 0; i < fireflies.length; i++) {
                        var f = fireflies[i];
                        var pulse = 0.5 + 0.5 * Math.sin(time * 0.002 * f.speed + f.phase);
                        var alpha = pulse * f.glow * 0.7;

                        if (alpha < 0.05) continue;

                        var radius = f.size * (0.8 + pulse * 0.6);
                        var grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, radius * 3);
                        grad.addColorStop(0, 'hsla(' + f.hue + ', ' + f.sat + '%, 90%, ' + alpha + ')');
                        grad.addColorStop(0.3, 'hsla(' + f.hue + ', ' + f.sat + '%, 70%, ' + alpha * 0.4 + ')');
                        grad.addColorStop(1, 'hsla(' + f.hue + ', ' + f.sat + '%, 50%, 0)');

                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, radius * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.globalCompositeOperation = 'source-over';
                }

                function loop(ts) {
                    if (!running) return;
                    update();
                    draw(ts);
                    rafId = requestAnimationFrame(loop);
                }

                // Init
                resize();
                for (var i = 0; i < NUM; i++) {
                    fireflies.push(createFirefly());
                }
                rafId = requestAnimationFrame(loop);

                window.addEventListener('resize', resize);

                // Stop on scene transition
                var observer = new MutationObserver(function() {
                    if (document.body.classList.contains('scene-transition-start')) {
                        running = false;
                        if (rafId) cancelAnimationFrame(rafId);
                        ctx.clearRect(0, 0, W, H);
                        observer.disconnect();
                    }
                });
                observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
            }

            // ============================================================
            // 3. Initialize
            // ============================================================
            function init() {
                initForest();
                initFireflies();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
