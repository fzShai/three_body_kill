<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌌 三体杀 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #0a0e1a 0%, #050810 100%);
            color: #fff;
        }
        .container {
            background: rgba(26, 31, 53, 0.85);
            backdrop-filter: blur(12px);
            padding: 48px 40px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.05);
        }
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 28px;
            letter-spacing: 4px;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .tabs button {
            flex: 1;
            padding: 12px 0;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .tabs button.active {
            background: rgba(0, 229, 255, 0.12);
            color: #00e5ff;
        }
        .tabs button:hover {
            background: rgba(0, 229, 255, 0.06);
        }
        .form-panel {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .form-panel.active {
            display: flex;
        }
        .form-panel label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }
        .form-panel input {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .form-panel input:focus {
            border-color: rgba(0, 229, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.04);
        }
        .form-panel input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .form-panel button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 4px;
        }
        .form-panel button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.2);
        }
        .form-panel button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            text-align: center;
            font-size: 14px;
            margin-top: 16px;
            min-height: 24px;
            color: rgba(255, 255, 255, 0.5);
        }
        .message.success {
            color: #00e5ff;
        }
        .message.error {
            color: #ff4757;
        }
        .hint-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            margin-top: 4px;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255, 255, 255, 0.7), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="title">🌌 三体杀</div>
        <div class="subtitle">✦ 黑暗森林 · 在线对决 ✦</div>

        <div class="tabs">
            <button id="loginTab" class="active">登录</button>
            <button id="registerTab">注册</button>
        </div>

        <!-- 登录面板 -->
        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="输入密码" />
            <button id="loginBtn">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <!-- 注册面板 -->
        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
            <label>确认密码</label>
            <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
            <button id="registerBtn">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const messageEl = document.getElementById('message');

        // Tab 切换
        document.getElementById('loginTab').addEventListener('click', () => {
            setTab('login');
        });
        document.getElementById('registerTab').addEventListener('click', () => {
            setTab('register');
        });

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        // 登录
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await doRequest('/api/login', username, password, '登录成功！');
        });

        // 注册
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();

            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }

            const btn = url === '/api/login' ?
                document.getElementById('loginBtn') :
                document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        // ✅ 登录成功：保存用户名，跳转到大厅
                        localStorage.setItem('username', username);
                        setTimeout(() => {
                            window.location.href = '/lobby';
                        }, 500);
                    } else {
                        // ✅ 注册成功：清空注册表单，切到登录面板
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        // 按回车键触发登录/注册
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        // ✅ 如果已经登录过，自动跳转到大厅
        const savedUser = localStorage.getItem('username');
        if (savedUser) {
            window.location.href = '/lobby';
        }
    </script>
</body>
</html>
