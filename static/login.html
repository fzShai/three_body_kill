<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 登录</title>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/motion.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            font-weight: 500;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6vh 8vw;
            color: var(--ink);
            background: linear-gradient(to bottom, var(--bg-void) 0%, #041018 52%, #02080c 100%);
        }

        /* Pure DOM starfield — no tiled CSS stars */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star-dot {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 4px rgba(255,255,255,0.55);
            pointer-events: none;
            transition:
                opacity 1.25s ease,
                filter 1.25s ease,
                transform 1.25s ease;
            will-change: opacity, filter, transform;
        }
        .star-dot.out {
            opacity: 0 !important;
            filter: brightness(0);
            transform: scale(0.35);
        }

        .drift-star {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 50% 45%, #fff 0%, #fff 40%, transparent 100%);
            box-shadow: 0 0 22px rgba(255,255,255,0.85), 0 0 56px rgba(200,220,235,0.22);
            transition:
                opacity 1.35s ease,
                filter 1.35s ease,
                transform 1.35s ease,
                box-shadow 1.35s ease;
            animation: star-flicker ease-in-out infinite;
        }
        .drift-star:nth-of-type(1) { width: 9px; height: 9px; animation-duration: 5.2s; }
        .drift-star:nth-of-type(2) { width: 6px; height: 6px; animation-duration: 7s; animation-delay: 0.4s; }
        .drift-star:nth-of-type(3) { width: 11px; height: 11px; animation-duration: 8.2s; animation-delay: 0.8s; }
        .drift-star.out {
            opacity: 0 !important;
            filter: brightness(0);
            transform: translate(-50%, -50%) scale(0.2);
            box-shadow: none;
            animation: none;
        }
        @keyframes star-flicker {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 0.95; }
        }

        /* Minimal clearing — sparse silhouette only */
        .forest-clearing {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 34vh;
            z-index: 2;
            pointer-events: none;
        }
        .forest-clearing svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .forest-clearing .ridge {
            fill: rgba(4, 8, 12, 0.72);
        }
        .forest-clearing .trees {
            fill: rgba(0, 0, 0, 0.92);
        }

        .coord-flash {
            position: fixed;
            left: 50%;
            top: 36%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.28em;
            color: rgba(200, 220, 235, 0.4);
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .coord-flash.show { opacity: 1; }

        /* Meteor: behind forest (z < forest) */
        .meteor {
            position: fixed;
            left: 0;
            top: 0;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.95);
            will-change: transform, opacity;
        }
        .meteor::before {
            content: '';
            position: absolute;
            right: 50%;
            top: 50%;
            width: 72px;
            height: 2px;
            transform: translateY(-50%) rotate(45deg);
            transform-origin: right center;
            background: linear-gradient(90deg, transparent 0%, rgba(230,240,250,0.15) 40%, rgba(255,255,255,0.85) 100%);
            filter: blur(0.4px);
        }
        .meteor.fly {
            opacity: 1;
            animation: meteor-fall 1.65s cubic-bezier(0.22, 0.05, 0.45, 1) forwards;
        }
        /* 45° from upper-left toward impact ~55% x, 72% y (behind treeline) */
        @keyframes meteor-fall {
            0% {
                opacity: 0;
                transform: translate(8vw, 4vh);
                filter: blur(0.8px);
            }
            8% {
                opacity: 0.85;
                filter: blur(0.35px);
            }
            70% {
                opacity: 1;
                filter: blur(0);
                transform: translate(48vw, 58vh);
            }
            92% {
                opacity: 0.7;
                filter: blur(0);
                transform: translate(54vw, 70vh);
            }
            100% {
                opacity: 0;
                transform: translate(55vw, 72vh);
                filter: blur(0);
            }
        }

        .impact-core {
            position: fixed;
            left: 55%;
            top: 72%;
            width: 6px;
            height: 6px;
            margin: -3px 0 0 -3px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 16px rgba(255,255,255,0.9);
        }
        .impact-core.on {
            animation: impact-ping 0.35s ease-out forwards;
        }
        @keyframes impact-ping {
            0% { opacity: 0; transform: scale(0.4); }
            40% { opacity: 1; transform: scale(1.4); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        /* Radial white bloom from impact — sharp, not blurry */
        .bloom-veil {
            position: fixed;
            left: 55%;
            top: 72%;
            width: 24px;
            height: 24px;
            margin: -12px 0 0 -12px;
            border-radius: 50%;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle, #ffffff 0%, #f2f6fa 55%, #e8eef4 100%);
            transform: scale(0.01);
            will-change: transform, opacity;
        }
        .bloom-veil.expand {
            opacity: 1;
            animation: bloom-expand 1s cubic-bezier(0.15, 0.2, 0.25, 1) forwards;
        }
        @keyframes bloom-expand {
            0% { opacity: 1; transform: scale(0.01); }
            70% { opacity: 1; transform: scale(55); }
            100% { opacity: 1; transform: scale(90); }
        }

        .void-veil {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            background: #000;
            transition: opacity 0.3s ease;
        }
        .void-veil.on { opacity: 1; }

        body[data-scene] .container {
            opacity: 0;
            pointer-events: none;
        }
        body[data-scene="start"] .drift-star {
            animation-play-state: paused;
        }
        body[data-scene="void"] {
            background: #000;
        }

        .container {
            position: relative;
            z-index: 4;
            width: 100%;
            max-width: 420px;
            margin-right: 6vw;
            padding: 40px 36px;
            border-radius: 0;
            background: rgba(8, 12, 20, 0.55);
            backdrop-filter: blur(12px) saturate(110%);
            -webkit-backdrop-filter: blur(12px) saturate(110%);
            border: 1px solid var(--line-strong);
            overflow: visible;
            transition: opacity 0.9s ease;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--ink);
        }
        .subtitle {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 20px;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
        .tabs button {
            flex: none;
            padding: 8px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--ink-dim);
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font-ui);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .tabs button.active {
            background: var(--accent-ice-glow);
            color: var(--accent-ice-bright);
            border-color: var(--accent-ice);
        }
        .tabs button:hover {
            border-color: var(--accent-ice);
            color: var(--accent-ice-bright);
        }

        .form-panel { display: none; flex-direction: column; gap: 14px; }
        .form-panel.active { display: flex; }
        .form-panel label { font-size: 13px; color: var(--ink-dim); font-weight: 600; }
        .form-panel input {
            padding: 12px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: var(--bg-inset);
            color: var(--ink);
            font-size: 15px;
            outline: none;
            font-family: var(--font-ui);
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel input:focus {
            border-color: var(--accent-ice);
            background: rgba(8, 16, 24, 0.7);
        }
        .form-panel input::placeholder { color: var(--ink-muted); }

        .password-row { position: relative; }
        .password-row input { width: 100%; padding-right: 46px; }
        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent-ice);
            cursor: pointer;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        .password-toggle.hidden::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 32px;
            background: currentColor;
            transform: rotate(-45deg);
        }

        .form-panel button[id$="Btn"] {
            padding: 12px;
            border-radius: 0;
            border: 1px solid var(--line-strong);
            background: var(--accent-ice-dim);
            color: var(--ink);
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel button[id$="Btn"]:hover {
            background: rgba(122, 158, 176, 0.32);
            border-color: var(--accent-ice);
        }

        .message {
            text-align: left;
            font-size: 14px;
            margin-top: 8px;
            min-height: 20px;
            color: var(--ink-dim);
        }
        .message.success { color: var(--ok); }
        .message.error { color: #c87878; }
        .hint-text {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: left;
            margin-top: 6px;
        }

        .panel-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 44px;
            height: 20px;
            z-index: 6;
            pointer-events: none;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .panel-badge .bar { height: 1px; background: var(--line-strong); }
        .panel-badge .bar.short { width: 12px; }
        .panel-badge .bar.long { width: 28px; opacity: 0.7; }
        .panel-badge::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: -6px;
            width: 8px;
            height: 8px;
            background: var(--accent-ice-dim);
        }

        @media (max-width: 900px) {
            body { justify-content: center; padding: 6vh 6vw; }
            .container { margin: 0; max-width: 460px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .meteor.fly,
            .bloom-veil.expand,
            .impact-core.on,
            .drift-star { animation: none !important; }
            .star-dot, .drift-star { transition-duration: 0.2s !important; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField" aria-hidden="true">
        <div class="drift-star" data-l="8vw" data-t="18vh"></div>
        <div class="drift-star" data-l="6vw" data-t="32vh"></div>
        <div class="drift-star" data-l="12vw" data-t="44vh"></div>
    </div>

    <div class="meteor" id="meteor" aria-hidden="true"></div>
    <div class="impact-core" id="impactCore" aria-hidden="true"></div>

    <div class="forest-clearing" aria-hidden="true">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
            <path class="ridge" d="M0,210 C120,188 240,198 360,180 C480,162 600,190 720,175 C840,160 960,185 1080,170 C1200,155 1320,175 1440,165 L1440,320 L0,320 Z"/>
            <path class="trees" d="M0,250 L40,210 L55,235 L70,195 L95,240 L120,200 L145,245 L170,205 L200,250 L230,210 L255,248 L280,215 L310,255 L340,218 L370,258 L400,220 L430,260 L460,222 L490,262 L520,225 L550,265 L580,228 L610,268 L640,230 L670,270 L700,232 L730,272 L760,235 L790,274 L820,238 L850,276 L880,240 L910,278 L940,242 L970,280 L1000,245 L1030,282 L1060,248 L1090,284 L1120,250 L1150,286 L1180,252 L1210,288 L1240,255 L1270,290 L1300,258 L1330,292 L1360,262 L1390,294 L1440,268 L1440,320 L0,320 Z"/>
        </svg>
    </div>

    <div class="coord-flash" id="coordFlash" aria-hidden="true"></div>
    <div class="bloom-veil" id="bloomVeil" aria-hidden="true"></div>
    <div class="void-veil" id="voidVeil" aria-hidden="true"></div>

    <div class="container">
        <div class="panel-badge" aria-hidden="true">
            <div class="bar short"></div>
            <div class="bar long"></div>
        </div>
        <div class="title">三体杀</div>
        <div class="subtitle">Dark Forest · Sign in</div>

        <div class="tabs">
            <button id="loginTab" class="active" type="button">登录</button>
            <button id="registerTab" type="button">注册</button>
        </div>

        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="loginPassword" placeholder="输入密码" />
                <button type="button" class="password-toggle hidden" data-target="loginPassword" aria-label="显示密码">👁</button>
            </div>
            <button id="loginBtn" type="button">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
                <button type="button" class="password-toggle hidden" data-target="regPassword" aria-label="显示密码">👁</button>
            </div>
            <label>确认密码</label>
            <div class="password-row">
                <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
                <button type="button" class="password-toggle hidden" data-target="regPasswordConfirm" aria-label="显示密码">👁</button>
            </div>
            <button id="registerBtn" type="button">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const login_animation = true;
        const messageEl = document.getElementById('message');

        document.getElementById('loginTab').addEventListener('click', () => setTab('login'));
        document.getElementById('registerTab').addEventListener('click', () => setTab('register'));

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            await doRequest(
                '/api/login',
                document.getElementById('loginUsername').value.trim(),
                document.getElementById('loginPassword').value.trim(),
                '登录成功！'
            );
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }
            const btn = url === '/api/login'
                ? document.getElementById('loginBtn')
                : document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                    signal: ctrl.signal,
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        localStorage.setItem('username', data.username || username);
                        if (login_animation) startSceneTransition();
                        else window.location.href = '/lobby';
                    } else {
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                showMessage(
                    err.name === 'AbortError' ? '请求超时，请检查网络后重试' : '网络错误，请稍后重试',
                    'error'
                );
            } finally {
                clearTimeout(timer);
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function syncPasswordToggle(button) {
            const input = document.getElementById(button.getAttribute('data-target'));
            if (!input) return;
            const isPassword = input.type === 'password';
            button.classList.toggle('hidden', isPassword);
            button.setAttribute('aria-label', isPassword ? '显示密码' : '隐藏密码');
        }
        document.querySelectorAll('.password-toggle').forEach((button) => {
            syncPasswordToggle(button);
            button.addEventListener('click', () => {
                const input = document.getElementById(button.getAttribute('data-target'));
                if (!input) return;
                input.type = input.type === 'password' ? 'text' : 'password';
                syncPasswordToggle(button);
            });
        });

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        function createTimeline() {
            let events = [];
            let startTime = null;
            let rafId = null;
            let nextEventIndex = 0;
            let cancelled = false;
            function at(ms, fn) {
                events.push({ at: ms, fn });
                return api;
            }
            function start() {
                if (startTime !== null) return;
                cancelled = false;
                events.sort((a, b) => a.at - b.at);
                nextEventIndex = 0;
                startTime = performance.now();
                tick(startTime);
            }
            function cancel() {
                cancelled = true;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = null;
                startTime = null;
            }
            function tick(ts) {
                if (cancelled) return;
                const elapsed = ts - startTime;
                while (nextEventIndex < events.length && events[nextEventIndex].at <= elapsed) {
                    try { events[nextEventIndex].fn(); } catch (e) { console.error(e); }
                    nextEventIndex++;
                }
                if (nextEventIndex < events.length) rafId = requestAnimationFrame(tick);
                else rafId = null;
            }
            const api = { at, start, cancel };
            return api;
        }

        function seedFieldStars() {
            const field = document.getElementById('starField');
            /* Dense DOM-only field (no CSS tile). Keep above treeline. */
            const positions = [];
            for (let i = 0; i < 52; i++) {
                const x = 3 + (i * 17) % 94;
                const y = 4 + ((i * 29) % 58);
                positions.push([x, y, i]);
            }
            positions.forEach(([x, y, i]) => {
                const d = document.createElement('div');
                d.className = 'star-dot';
                d.style.left = x + '%';
                d.style.top = y + '%';
                const size = i % 6 === 0 ? 2.4 : (i % 3 === 0 ? 1.8 : 1.3);
                d.style.width = size + 'px';
                d.style.height = size + 'px';
                d.style.opacity = String(0.28 + (i % 8) * 0.07);
                field.appendChild(d);
            });
        }
        seedFieldStars();

        function startSceneTransition() {
            const goLobby = () => {
                try { sessionStorage.setItem('tbk_enter', 'void'); } catch (e) {}
                window.location.href = '/lobby';
            };

            const container = document.querySelector('.container');
            if (container) {
                container.setAttribute('aria-hidden', 'true');
                let live = document.getElementById('transition-announcer');
                if (!live) {
                    live = document.createElement('div');
                    live.id = 'transition-announcer';
                    live.setAttribute('aria-live', 'assertive');
                    live.setAttribute('role', 'status');
                    live.style.cssText = 'position:fixed;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);';
                    document.body.appendChild(live);
                }
                live.textContent = '登录成功，正在前往大厅...';
            }

            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.body.dataset.scene = 'start';
                setTimeout(goLobby, 400);
                return;
            }

            document.body.dataset.scene = 'start';
            if (window.stopStarDrift) window.stopStarDrift();

            const dots = Array.from(document.querySelectorAll('.star-dot'));
            const drifts = Array.from(document.querySelectorAll('.drift-star'));
            const targets = [...dots, ...drifts];
            for (let i = targets.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [targets[i], targets[j]] = [targets[j], targets[i]];
            }

            const timeline = createTimeline();
            const coord = document.getElementById('coordFlash');
            const meteor = document.getElementById('meteor');
            const impact = document.getElementById('impactCore');
            const bloom = document.getElementById('bloomVeil');
            const voidEl = document.getElementById('voidVeil');

            /* Gradual extinguish: staggered starts, each fades ~1.25s */
            const n = targets.length;
            targets.forEach((el, idx) => {
                const t = idx / Math.max(1, n - 1);
                const atMs = 250 + Math.pow(t, 1.25) * 3000;
                timeline.at(atMs, () => {
                    document.body.dataset.scene = 'extinguish';
                    el.classList.add('out');
                });
            });

            timeline.at(3400, () => {
                const a = Math.floor(Math.random() * 90 + 10);
                const b = Math.floor(Math.random() * 900 + 100);
                const c = Math.floor(Math.random() * 900 + 100);
                coord.textContent = `α · ${a}.${b} · ${c}`;
                coord.classList.add('show');
            });
            timeline.at(3750, () => {
                coord.classList.remove('show');
                coord.textContent = '';
            });

            /* Meteor 45° — falls behind forest */
            timeline.at(3900, () => {
                document.body.dataset.scene = 'meteor';
                meteor.classList.add('fly');
            });

            timeline.at(5450, () => {
                meteor.classList.remove('fly');
                meteor.style.opacity = '0';
                impact.classList.add('on');
            });

            /* White bloom from impact behind treeline */
            timeline.at(5600, () => {
                document.body.dataset.scene = 'bloom';
                bloom.classList.add('expand');
            });

            timeline.at(6550, () => {
                document.body.dataset.scene = 'void';
                voidEl.classList.add('on');
            });

            timeline.at(7800, () => {
                const announcer = document.getElementById('transition-announcer');
                if (announcer) announcer.remove();
            });

            timeline.at(8500, goLobby);
            timeline.start();
            window._sceneTimeline = timeline;
        }

        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        (async () => {
            if (!localStorage.getItem('username')) return;
            try {
                const res = await fetch('/api/rooms', { credentials: 'include' });
                if (res.ok) window.location.href = '/lobby';
                else localStorage.removeItem('username');
            } catch (e) { /* stay */ }
        })();

        window.addEventListener('beforeunload', () => {
            if (window._sceneTimeline) window._sceneTimeline.cancel();
        });
    </script>
    <script>
        (function () {
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            if (!stars.length) return;
            const container = document.querySelector('.container');
            const vw = () => window.innerWidth / 100;
            const vh = () => window.innerHeight / 100;
            const rand = (a, b) => Math.random() * (b - a) + a;
            let running = true;

            stars.forEach((el) => {
                el.style.left = el.getAttribute('data-l') || '8vw';
                el.style.top = el.getAttribute('data-t') || '18vh';
            });

            class Walker {
                constructor(el) {
                    this.el = el;
                    this.minX = Math.max(2 * vw(), 8);
                    const containerLeft = container
                        ? container.getBoundingClientRect().left
                        : window.innerWidth - 140;
                    this.maxX = Math.max(this.minX + 20, containerLeft - 60);
                    this.minY = 5 * vh();
                    this.maxY = 52 * vh();
                    const cs = getComputedStyle(el);
                    this.baseX = parseFloat(cs.left) || this.minX + 20;
                    this.baseY = parseFloat(cs.top) || this.minY + 20;
                    this.setNewTarget();
                }
                setNewTarget() {
                    this.startX = this.baseX;
                    this.startY = this.baseY;
                    this.targetX = rand(this.minX, this.maxX);
                    this.targetY = rand(this.minY, this.maxY);
                    this.duration = rand(4500, 12000);
                    this.startTime = undefined;
                }
                step(ts) {
                    if (!this.startTime) this.startTime = ts;
                    const t = Math.min((ts - this.startTime) / this.duration, 1);
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    const curX = this.startX + (this.targetX - this.startX) * ease;
                    const curY = this.startY + (this.targetY - this.startY) * ease;
                    this.el.style.left = curX + 'px';
                    this.el.style.top = curY + 'px';
                    if (t >= 1) {
                        this.baseX = curX;
                        this.baseY = curY;
                        this.setNewTarget();
                    }
                }
            }

            const walkers = stars.map((s) => new Walker(s));
            window.stopStarDrift = () => { running = false; };
            function loop(ts) {
                if (!running) return;
                walkers.forEach((w) => w.step(ts));
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
