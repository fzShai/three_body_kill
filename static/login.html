<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 登录</title>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/motion.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            font-weight: 500;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6vh 8vw;
            color: var(--ink);
            background: linear-gradient(to bottom, var(--bg-void) 0%, #041018 48%, #02080c 100%);
        }

        .stars {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.45;
            mix-blend-mode: screen;
            background-image:
                radial-gradient(circle at 10px 20px, rgba(255,255,255,0.9) 0 1px, transparent 2px),
                radial-gradient(circle at 40px 70px, rgba(255,255,255,0.75) 0 1px, transparent 2px),
                radial-gradient(circle at 50px 160px, rgba(255,255,255,0.6) 0 1px, transparent 2px),
                radial-gradient(circle at 90px 40px, rgba(255,255,255,0.55) 0 1px, transparent 2px),
                radial-gradient(circle at 130px 80px, rgba(255,255,255,0.85) 0 1px, transparent 2px),
                radial-gradient(circle at 180px 130px, rgba(255,255,255,0.4) 0 1px, transparent 2px);
            background-size: 220px 220px;
            transition: opacity 1.2s ease;
        }
        .stars.extinguished { opacity: 0; }

        .star-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
            opacity: 0.7;
            transition: opacity 0.55s ease, transform 0.55s ease;
            pointer-events: none;
        }
        .star-dot.out {
            opacity: 0;
            transform: scale(0.2);
        }

        .drift-star {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            display: block;
            transform: translate(-50%, -50%) scale(1);
            background: radial-gradient(circle at 50% 45%, #fff 0%, #fff 34%, #f8fbff 50%, transparent 100%);
            box-shadow: 0 0 28px rgba(255,255,255,0.9), 0 0 70px rgba(210,230,245,0.25);
            opacity: 0.9;
            transition: opacity 0.7s ease, transform 0.7s ease, filter 0.4s ease;
            animation: star-flicker ease-in-out infinite;
        }
        .drift-star:nth-of-type(1) { width: 10px; height: 10px; animation-duration: 5.2s; }
        .drift-star:nth-of-type(2) { width: 7px; height: 7px; animation-duration: 7.2s; animation-delay: 0.4s; }
        .drift-star:nth-of-type(3) { width: 12px; height: 12px; animation-duration: 8.4s; animation-delay: 0.8s; }
        .drift-star.out {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0.15);
            animation: none;
            filter: brightness(0.2);
        }
        @keyframes star-flicker {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 1; }
        }

        .coord-flash {
            position: fixed;
            left: 50%;
            top: 42%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.28em;
            color: rgba(200, 220, 235, 0.45);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .coord-flash.show { opacity: 1; }

        .strike-particle {
            position: fixed;
            left: 50%;
            top: 48%;
            width: 4px;
            height: 4px;
            margin: -2px 0 0 -2px;
            border-radius: 50%;
            z-index: 6;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle, #fff 0%, rgba(200, 230, 245, 0.9) 35%, transparent 70%);
            box-shadow:
                0 0 12px rgba(255,255,255,0.95),
                0 0 40px rgba(180, 210, 230, 0.45);
            transform: translate3d(0, 0, 0) scale(0.08);
            will-change: transform, opacity;
        }
        .strike-particle.tail::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 2px;
            height: 28px;
            transform: translate(-50%, -100%);
            background: linear-gradient(to top, rgba(255,255,255,0.55), transparent);
            filter: blur(1px);
            opacity: 0.6;
        }
        .strike-particle.fly {
            opacity: 1;
            animation: strike-rush 1.8s cubic-bezier(0.15, 0.05, 0.35, 1) forwards;
        }
        @keyframes strike-rush {
            0% {
                opacity: 0.2;
                transform: translate3d(0, 8vh, 0) scale(0.06);
                filter: blur(1.5px);
            }
            40% {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(0.35);
                filter: blur(0.4px);
            }
            85% {
                opacity: 1;
                transform: translate3d(0, -2vh, 0) scale(18);
                filter: blur(0);
            }
            100% {
                opacity: 0.95;
                transform: translate3d(0, -2vh, 0) scale(48);
                filter: blur(0);
            }
        }

        .flash-veil,
        .void-veil {
            position: fixed;
            inset: 0;
            z-index: 7;
            pointer-events: none;
            opacity: 0;
        }
        .flash-veil {
            background: #f5f8fc;
            z-index: 8;
        }
        .flash-veil.on {
            animation: hard-flash 0.5s ease-out forwards;
        }
        @keyframes hard-flash {
            0% { opacity: 0; }
            12% { opacity: 1; }
            55% { opacity: 1; }
            100% { opacity: 0; }
        }
        .void-veil {
            background: #000;
            z-index: 9;
            transition: opacity 0.35s ease;
        }
        .void-veil.on { opacity: 1; }

        body[data-scene] .container {
            opacity: 0;
            pointer-events: none;
        }
        body[data-scene="start"] .drift-star {
            animation-play-state: paused;
        }
        body[data-scene="void"] {
            background: #000;
        }
        body[data-scene="void"] .stars {
            opacity: 0;
        }

        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 420px;
            margin-right: 6vw;
            padding: 40px 36px;
            border-radius: 0;
            background: rgba(8, 12, 20, 0.55);
            backdrop-filter: blur(12px) saturate(110%);
            -webkit-backdrop-filter: blur(12px) saturate(110%);
            border: 1px solid var(--line-strong);
            overflow: visible;
            transition: opacity 0.9s ease;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--ink);
        }
        .subtitle {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 20px;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
        .tabs button {
            flex: none;
            padding: 8px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--ink-dim);
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font-ui);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .tabs button.active {
            background: var(--accent-ice-glow);
            color: var(--accent-ice-bright);
            border-color: var(--accent-ice);
        }
        .tabs button:hover {
            border-color: var(--accent-ice);
            color: var(--accent-ice-bright);
        }

        .form-panel { display: none; flex-direction: column; gap: 14px; }
        .form-panel.active { display: flex; }
        .form-panel label { font-size: 13px; color: var(--ink-dim); font-weight: 600; }
        .form-panel input {
            padding: 12px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: var(--bg-inset);
            color: var(--ink);
            font-size: 15px;
            outline: none;
            font-family: var(--font-ui);
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel input:focus {
            border-color: var(--accent-ice);
            background: rgba(8, 16, 24, 0.7);
        }
        .form-panel input::placeholder { color: var(--ink-muted); }

        .password-row { position: relative; }
        .password-row input { width: 100%; padding-right: 46px; }
        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent-ice);
            cursor: pointer;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        .password-toggle.hidden::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 32px;
            background: currentColor;
            transform: rotate(-45deg);
        }

        .form-panel button[id$="Btn"] {
            padding: 12px;
            border-radius: 0;
            border: 1px solid var(--line-strong);
            background: var(--accent-ice-dim);
            color: var(--ink);
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel button[id$="Btn"]:hover {
            background: rgba(122, 158, 176, 0.32);
            border-color: var(--accent-ice);
        }

        .message {
            text-align: left;
            font-size: 14px;
            margin-top: 8px;
            min-height: 20px;
            color: var(--ink-dim);
        }
        .message.success { color: var(--ok); }
        .message.error { color: #c87878; }
        .hint-text {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: left;
            margin-top: 6px;
        }

        .panel-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 44px;
            height: 20px;
            z-index: 6;
            pointer-events: none;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .panel-badge .bar { height: 1px; background: var(--line-strong); }
        .panel-badge .bar.short { width: 12px; }
        .panel-badge .bar.long { width: 28px; opacity: 0.7; }
        .panel-badge::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: -6px;
            width: 8px;
            height: 8px;
            background: var(--accent-ice-dim);
        }

        @media (max-width: 900px) {
            body { justify-content: center; padding: 6vh 6vw; }
            .container { margin: 0; max-width: 460px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .strike-particle.fly,
            .flash-veil.on,
            .drift-star { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField" aria-hidden="true">
        <div class="drift-star" data-l="8vw" data-t="20vh"></div>
        <div class="drift-star" data-l="6vw" data-t="34vh"></div>
        <div class="drift-star" data-l="11vw" data-t="46vh"></div>
    </div>
    <div class="coord-flash" id="coordFlash" aria-hidden="true"></div>
    <div class="strike-particle tail" id="strikeParticle" aria-hidden="true"></div>
    <div class="flash-veil" id="flashVeil" aria-hidden="true"></div>
    <div class="void-veil" id="voidVeil" aria-hidden="true"></div>

    <div class="container">
        <div class="panel-badge" aria-hidden="true">
            <div class="bar short"></div>
            <div class="bar long"></div>
        </div>
        <div class="title">三体杀</div>
        <div class="subtitle">Dark Forest · Sign in</div>

        <div class="tabs">
            <button id="loginTab" class="active" type="button">登录</button>
            <button id="registerTab" type="button">注册</button>
        </div>

        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="loginPassword" placeholder="输入密码" />
                <button type="button" class="password-toggle hidden" data-target="loginPassword" aria-label="显示密码">👁</button>
            </div>
            <button id="loginBtn" type="button">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
                <button type="button" class="password-toggle hidden" data-target="regPassword" aria-label="显示密码">👁</button>
            </div>
            <label>确认密码</label>
            <div class="password-row">
                <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
                <button type="button" class="password-toggle hidden" data-target="regPasswordConfirm" aria-label="显示密码">👁</button>
            </div>
            <button id="registerBtn" type="button">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const login_animation = true;
        const messageEl = document.getElementById('message');

        document.getElementById('loginTab').addEventListener('click', () => setTab('login'));
        document.getElementById('registerTab').addEventListener('click', () => setTab('register'));

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await doRequest('/api/login', username, password, '登录成功！');
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }
            const btn = url === '/api/login'
                ? document.getElementById('loginBtn')
                : document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');

            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                    signal: ctrl.signal,
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        const loginUsername = data.username || username;
                        localStorage.setItem('username', loginUsername);
                        if (login_animation) {
                            startSceneTransition(loginUsername);
                        } else {
                            window.location.href = '/lobby';
                        }
                    } else {
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    showMessage('请求超时，请检查网络后重试', 'error');
                } else {
                    showMessage('网络错误，请稍后重试', 'error');
                }
            } finally {
                clearTimeout(timer);
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function syncPasswordToggle(button) {
            const input = document.getElementById(button.getAttribute('data-target'));
            if (!input) return;
            const isPassword = input.type === 'password';
            button.classList.toggle('hidden', isPassword);
            button.setAttribute('aria-label', isPassword ? '显示密码' : '隐藏密码');
        }
        document.querySelectorAll('.password-toggle').forEach((button) => {
            syncPasswordToggle(button);
            button.addEventListener('click', () => {
                const input = document.getElementById(button.getAttribute('data-target'));
                if (!input) return;
                input.type = input.type === 'password' ? 'text' : 'password';
                syncPasswordToggle(button);
            });
        });

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        function createTimeline() {
            let events = [];
            let startTime = null;
            let rafId = null;
            let nextEventIndex = 0;
            let cancelled = false;

            function at(ms, fn) {
                events.push({ at: ms, fn });
                return api;
            }
            function start() {
                if (startTime !== null) return;
                cancelled = false;
                events.sort((a, b) => a.at - b.at);
                nextEventIndex = 0;
                startTime = performance.now();
                tick(startTime);
            }
            function cancel() {
                cancelled = true;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = null;
                startTime = null;
            }
            function tick(ts) {
                if (cancelled) return;
                const elapsed = ts - startTime;
                while (nextEventIndex < events.length && events[nextEventIndex].at <= elapsed) {
                    try { events[nextEventIndex].fn(); } catch (e) { console.error(e); }
                    nextEventIndex++;
                }
                if (nextEventIndex < events.length) {
                    rafId = requestAnimationFrame(tick);
                } else {
                    rafId = null;
                }
            }
            const api = { at, start, cancel };
            return api;
        }

        function seedFieldStars() {
            const field = document.getElementById('starField');
            const positions = [
                [12, 14], [28, 22], [44, 11], [61, 19], [78, 15], [88, 28],
                [18, 38], [35, 44], [52, 36], [69, 48], [84, 41],
                [8, 58], [25, 62], [41, 55], [58, 68], [74, 59], [91, 72],
                [15, 78], [32, 84], [48, 76], [66, 88], [82, 81],
            ];
            positions.forEach(([x, y], i) => {
                const d = document.createElement('div');
                d.className = 'star-dot';
                d.style.left = x + '%';
                d.style.top = y + '%';
                d.style.width = (i % 5 === 0 ? 2.5 : 1.5) + 'px';
                d.style.height = d.style.width;
                d.style.opacity = String(0.35 + (i % 7) * 0.07);
                field.appendChild(d);
            });
        }
        seedFieldStars();

        function startSceneTransition() {
            const goLobby = () => {
                try { sessionStorage.setItem('tbk_enter', 'void'); } catch (e) {}
                window.location.href = '/lobby';
            };

            const container = document.querySelector('.container');
            if (container) {
                container.setAttribute('aria-hidden', 'true');
                let live = document.getElementById('transition-announcer');
                if (!live) {
                    live = document.createElement('div');
                    live.id = 'transition-announcer';
                    live.setAttribute('aria-live', 'assertive');
                    live.setAttribute('role', 'status');
                    live.style.cssText = 'position:fixed;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);';
                    document.body.appendChild(live);
                }
                live.textContent = '登录成功，正在前往大厅...';
            }

            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.body.dataset.scene = 'start';
                setTimeout(goLobby, 400);
                return;
            }

            document.body.dataset.scene = 'start';
            if (window.stopStarDrift) window.stopStarDrift();

            const dots = Array.from(document.querySelectorAll('.star-dot'));
            const drifts = Array.from(document.querySelectorAll('.drift-star'));
            const extinguishTargets = [...dots, ...drifts];
            // Shuffle for uneven kill order
            for (let i = extinguishTargets.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [extinguishTargets[i], extinguishTargets[j]] = [extinguishTargets[j], extinguishTargets[i]];
            }

            const timeline = createTimeline();
            const coord = document.getElementById('coordFlash');
            const strike = document.getElementById('strikeParticle');
            const flash = document.getElementById('flashVeil');
            const voidEl = document.getElementById('voidVeil');
            const field = document.getElementById('starField');

            // Extinguish stars: slow then fast across ~0.3–3.2s
            const n = extinguishTargets.length;
            extinguishTargets.forEach((el, idx) => {
                const t = idx / Math.max(1, n - 1);
                const atMs = 300 + Math.pow(t, 1.35) * 2900;
                timeline.at(atMs, () => {
                    document.body.dataset.scene = 'extinguish';
                    el.classList.add('out');
                });
            });

            timeline.at(3100, () => {
                field.classList.add('extinguished');
            });

            // Coordinate flash — erased
            timeline.at(3200, () => {
                const a = Math.floor(Math.random() * 90 + 10);
                const b = Math.floor(Math.random() * 900 + 100);
                const c = Math.floor(Math.random() * 900 + 100);
                coord.textContent = `α · ${a}.${b} · ${c}`;
                coord.classList.add('show');
            });
            timeline.at(3550, () => {
                coord.classList.remove('show');
                coord.textContent = '';
            });

            // Strike particle toward camera
            timeline.at(3600, () => {
                document.body.dataset.scene = 'strike';
                strike.classList.add('fly');
            });

            // Hard white flash — our civilization hit
            timeline.at(5400, () => {
                document.body.dataset.scene = 'flash';
                flash.classList.add('on');
                strike.classList.remove('fly');
                strike.style.opacity = '0';
            });

            // Absolute void
            timeline.at(5900, () => {
                document.body.dataset.scene = 'void';
                voidEl.classList.add('on');
                flash.classList.remove('on');
            });

            timeline.at(7500, () => {
                const announcer = document.getElementById('transition-announcer');
                if (announcer) announcer.remove();
            });

            timeline.at(8200, goLobby);
            timeline.start();
            window._sceneTimeline = timeline;
        }

        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        (async () => {
            const savedUser = localStorage.getItem('username');
            if (!savedUser) return;
            try {
                const res = await fetch('/api/rooms', { credentials: 'include' });
                if (res.ok) window.location.href = '/lobby';
                else localStorage.removeItem('username');
            } catch (e) { /* stay */ }
        })();

        window.addEventListener('beforeunload', () => {
            if (window._sceneTimeline) window._sceneTimeline.cancel();
        });
    </script>
    <script>
        /* Idle drift for three bright stars */
        (function () {
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            if (!stars.length) return;
            const container = document.querySelector('.container');
            const vw = () => window.innerWidth / 100;
            const vh = () => window.innerHeight / 100;
            const rand = (a, b) => Math.random() * (b - a) + a;
            let running = true;

            stars.forEach((el) => {
                el.style.left = el.getAttribute('data-l') || '8vw';
                el.style.top = el.getAttribute('data-t') || '20vh';
            });

            class Walker {
                constructor(el) {
                    this.el = el;
                    this.minX = Math.max(2 * vw(), 8);
                    const containerLeft = container
                        ? container.getBoundingClientRect().left
                        : window.innerWidth - 140;
                    this.maxX = Math.max(this.minX + 20, containerLeft - 60);
                    this.minY = 6 * vh();
                    this.maxY = 88 * vh();
                    const cs = getComputedStyle(el);
                    this.baseX = parseFloat(cs.left) || this.minX + 20;
                    this.baseY = parseFloat(cs.top) || this.minY + 20;
                    this.setNewTarget();
                }
                setNewTarget() {
                    this.startX = this.baseX;
                    this.startY = this.baseY;
                    this.targetX = rand(this.minX, this.maxX);
                    this.targetY = rand(this.minY, this.maxY);
                    this.duration = rand(4000, 12000);
                    this.startTime = undefined;
                }
                step(ts) {
                    if (!this.startTime) this.startTime = ts;
                    const t = Math.min((ts - this.startTime) / this.duration, 1);
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    const curX = this.startX + (this.targetX - this.startX) * ease;
                    const curY = this.startY + (this.targetY - this.startY) * ease;
                    this.el.style.left = curX + 'px';
                    this.el.style.top = curY + 'px';
                    if (t >= 1) {
                        this.baseX = curX;
                        this.baseY = curY;
                        this.setNewTarget();
                    }
                }
            }

            let walkers = stars.map((s) => new Walker(s));
            window.stopStarDrift = () => { running = false; };

            function loop(ts) {
                if (!running) return;
                walkers.forEach((w) => w.step(ts));
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
