<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a1220 0%, #122033 50%, #1a2838 100%);
            color: #e8f4ff;
            padding: 32px 16px 48px;
        }
        .wrap { max-width: 560px; margin: 0 auto; }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #00e5ff, #6aa8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .sub { color: rgba(255,255,255,0.35); letter-spacing: 3px; font-size: 13px; margin-bottom: 28px; }
        .user-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 28px;
            color: rgba(255,255,255,0.55);
        }
        .user-bar span { color: #00e5ff; }
        .btn {
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { filter: brightness(1.08); }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.7);
        }
        .btn-outline:hover { border-color: #00e5ff; color: #00e5ff; }
        .hub {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .hub-btn {
            display: block;
            width: 100%;
            padding: 28px 24px;
            border-radius: 12px;
            border: 1px solid rgba(0, 200, 255, 0.22);
            background: rgba(12, 22, 36, 0.72);
            color: #e8f4ff;
            text-decoration: none;
            text-align: center;
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
        }
        .hub-btn:hover {
            border-color: #00e5ff;
            background: rgba(0, 60, 90, 0.35);
            transform: translateY(-1px);
        }
        .hub-btn .title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #9fd9ff;
            margin-bottom: 6px;
        }
        .hub-btn .desc {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>三体杀</h1>
        <div class="sub">✦ 大厅 · 集结 ✦</div>
        <div class="user-bar">
            <div>欢迎，<span id="usernameDisplay"></span></div>
            <button class="btn btn-outline" id="logoutBtn" type="button">退出登录</button>
        </div>

        <nav class="hub" aria-label="大厅入口">
            <a class="hub-btn" href="/static/battle.html">
                <div class="title">对战</div>
                <div class="desc">创建或加入房间</div>
            </a>
            <a class="hub-btn" href="/static/codex.html">
                <div class="title">图鉴</div>
                <div class="desc">角色 · 卡牌 · 成就</div>
            </a>
            <a class="hub-btn" href="/static/about.html">
                <div class="title">关于</div>
                <div class="desc">内容筹备中</div>
            </a>
        </nav>
    </div>
    <script src="/static/app.js"></script>
    <script>
        const username = TBK.requireLogin();
        if (username) {
            document.getElementById('usernameDisplay').textContent = username;
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try { await TBK.api('/api/logout', { method: 'POST', body: '{}' }); } catch (e) {}
                localStorage.removeItem('username');
                window.location.href = '/';
            });
        }
    </script>
</body>
</html>
