<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 对战</title>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <link rel="stylesheet" href="/static/css/motion.css" />
</head>
<body class="shell-page">
    <div class="wrap">
        <h1 class="brand motion-enter">三体杀</h1>
        <div class="brand-sub motion-enter motion-enter-delay-1">Battle · Rooms</div>
        <div class="user-info motion-enter motion-enter-delay-1">
            <div>
                <span class="ws-dot" id="wsDot"></span>
                欢迎，<span id="usernameDisplay"></span>
                · <span id="wsLabel">连接中…</span>
            </div>
            <a class="btn btn-outline" href="/lobby">返回入口</a>
        </div>

        <div class="panel radar-once">
            <h2>房间</h2>
            <div class="row">
                <button class="btn" id="createRoomBtn">创建房间</button>
                <input id="joinCode" maxlength="8" placeholder="输入房号" />
                <button class="btn btn-outline" id="joinRoomBtn">加入房间</button>
            </div>
            <div class="status" id="statusMsg"></div>
        </div>

        <div class="panel radar-once" style="animation-delay: 0.08s;">
            <h2>房间列表 <button class="btn btn-outline" id="refreshBtn" style="padding:5px 12px;font-size:12px;margin-left:8px;vertical-align:middle;">刷新</button></h2>
            <div id="roomListWrap">
                <div class="empty">加载中…</div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
    <script>
        const username = TBK.requireLogin();
        if (!username) { /* redirecting */ }
        else {
            document.getElementById('usernameDisplay').textContent = username;
            const statusMsg = document.getElementById('statusMsg');
            const wsDot = document.getElementById('wsDot');
            const wsLabel = document.getElementById('wsLabel');
            const sock = new TBK.GameSocket();

            function setStatus(text, kind) {
                statusMsg.textContent = text || '';
                statusMsg.className = 'status' + (kind ? ' ' + kind : '');
            }

            sock.on('_open', () => {
                wsDot.classList.add('on');
                wsLabel.textContent = '已连接';
            });
            sock.on('_close', () => {
                wsDot.classList.remove('on');
                wsLabel.textContent = '重连中…';
            });
            sock.on('error', (msg) => setStatus(msg.payload?.message || '错误', 'error'));
            sock.connect();

            async function loadRooms() {
                try {
                    const { data } = await TBK.api('/api/rooms');
                    const rooms = data.rooms || [];
                    const wrap = document.getElementById('roomListWrap');
                    if (!rooms.length) {
                        wrap.innerHTML = '<div class="empty">暂无房间 · 创建一个吧</div>';
                        return;
                    }
                    wrap.innerHTML = `
                        <table>
                            <thead><tr><th>房号</th><th>房主</th><th>人数</th><th>状态</th><th></th></tr></thead>
                            <tbody>
                                ${rooms.map((r) => `
                                    <tr>
                                        <td><strong>${r.room_id}</strong></td>
                                        <td>${r.host}</td>
                                        <td class="mono">${r.player_count}/${r.max_players}</td>
                                        <td>${r.status}</td>
                                        <td>${r.can_join ? `<button class="btn join" data-id="${r.room_id}" style="padding:6px 12px;font-size:12px;">加入</button>` : '—'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`;
                    wrap.querySelectorAll('button.join').forEach((btn) => {
                        btn.addEventListener('click', () => joinRoom(btn.getAttribute('data-id')));
                    });
                } catch (e) {
                    if (e.message !== 'unauthorized') setStatus('加载房间列表失败', 'error');
                }
            }

            async function createRoom() {
                setStatus('创建中…');
                try {
                    const { data } = await TBK.api('/api/rooms', { method: 'POST', body: '{}' });
                    if (!data.success) {
                        setStatus(data.message || '创建失败', 'error');
                        return;
                    }
                    window.location.href = '/room/' + data.room.room_id;
                } catch (e) {
                    if (e.message !== 'unauthorized') setStatus('网络错误', 'error');
                }
            }

            async function joinRoom(code) {
                const id = (code || '').trim().toUpperCase();
                if (!id) {
                    setStatus('请输入房号', 'error');
                    return;
                }
                setStatus('加入中…');
                try {
                    const { data } = await TBK.api('/api/rooms/' + encodeURIComponent(id) + '/join', {
                        method: 'POST',
                        body: '{}',
                    });
                    if (!data.success) {
                        setStatus(data.message || '加入失败', 'error');
                        return;
                    }
                    window.location.href = '/room/' + data.room.room_id;
                } catch (e) {
                    if (e.message !== 'unauthorized') setStatus('网络错误', 'error');
                }
            }

            document.getElementById('createRoomBtn').addEventListener('click', createRoom);
            document.getElementById('joinRoomBtn').addEventListener('click', () => {
                joinRoom(document.getElementById('joinCode').value);
            });
            document.getElementById('joinCode').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') joinRoom(document.getElementById('joinCode').value);
            });
            document.getElementById('refreshBtn').addEventListener('click', loadRooms);
            loadRooms();
            setInterval(loadRooms, 5000);
        }
    </script>
</body>
</html>
