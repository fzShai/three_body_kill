<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌌 三体杀 - 大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #f5d6b3 0%, #ecb26b 40%, #b44c1a 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 15%, rgba(255, 245, 210, 0.55), transparent 28%);
            pointer-events: none;
            opacity: 0.8;
            filter: blur(28px);
        }
        body::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 38vh;
            background: linear-gradient(180deg, rgba(255, 192, 123, 0.12), rgba(0,0,0,0.24));
            pointer-events: none;
        }
        .sunset-sun {
            position: absolute;
            bottom: 16vh;
            left: 50%;
            width: 34vh;
            height: 34vh;
            border-radius: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle at 35% 35%, #fff5c6 0%, #ffcd5d 22%, #ff7f28 55%, rgba(255, 116, 22, 0.0) 100%);
            box-shadow: 0 0 120px rgba(255, 170, 80, 0.28);
            filter: blur(0.6px);
            z-index: 0;
            opacity: 0.95;
        }
        .sunset-sun.small {
            width: 26vh;
            height: 26vh;
            left: 24%;
            bottom: 18vh;
        }
        .sunset-sun.right {
            width: 30vh;
            height: 30vh;
            left: 76%;
            bottom: 18vh;
        }
        .horizon-glow {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 16vh;
            background: radial-gradient(circle at 50% 0%, rgba(255, 226, 170, 0.35), transparent 55%);
            pointer-events: none;
            z-index: 0;
        }
        .forest-silhouette {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 24vh;
            background: linear-gradient(180deg, rgba(127,18,4,0) 0%, rgba(127,18,4,0.45) 30%, rgba(63,14,4,0.95) 100%);
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: multiply;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            backdrop-filter: blur(14px);
            background: rgba(20, 18, 26, 0.48);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: 0 0 80px rgba(255, 160, 80, 0.08);
            border-radius: 18px;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .sub {
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .user-info {
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            font-size: 16px;
        }
        .user-info span {
            color: #00e5ff;
        }
        .btn {
            display: inline-block;
            padding: 16px 48px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin: 8px;
            text-decoration: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.2);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
        }
        .btn-outline:hover {
            border-color: #00e5ff;
            color: #00e5ff;
            box-shadow: none;
        }
        .placeholder {
            color: rgba(255,255,255,0.1);
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="sunset-sun small"></div>
    <div class="sunset-sun"></div>
    <div class="sunset-sun right"></div>
    <div class="horizon-glow"></div>
    <div class="forest-silhouette"></div>
    <div class="container">
        <h1>🌌 三体杀</h1>
        <div class="sub">✦ 等待 · 集结 ✦</div>

        <div class="user-info">
            👤 欢迎，<span id="usernameDisplay"></span>
        </div>

        <div>
            <button class="btn" id="createRoomBtn">🚀 创建房间</button>
            <button class="btn btn-outline" id="logoutBtn">退出登录</button>
        </div>

        <div class="placeholder">
            ⚡ 房间功能开发中 · 敬请期待 ⚡
        </div>
    </div>

    <script>
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = '/';
        }
        document.getElementById('usernameDisplay').textContent = username;

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('username');
            window.location.href = '/';
        });

        document.getElementById('createRoomBtn').addEventListener('click', () => {
            alert('房间功能即将上线！🚀');
        });
    </script>
</body>
</html>
