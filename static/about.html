<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 关于</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a1220 0%, #122033 50%, #1a2838 100%);
            color: #e8f4ff;
            padding: 32px 16px 48px;
        }
        .wrap { max-width: 560px; margin: 0 auto; }
        h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #00e5ff, #6aa8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .sub { color: rgba(255,255,255,0.35); letter-spacing: 3px; font-size: 13px; margin-bottom: 28px; }
        .panel {
            background: rgba(12, 22, 36, 0.72);
            border: 1px solid rgba(0, 200, 255, 0.18);
            border-radius: 12px;
            padding: 28px 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .panel h2 { font-size: 18px; color: #9fd9ff; margin-bottom: 12px; font-weight: 700; }
        .placeholder { color: rgba(255,255,255,0.3); font-size: 14px; }
        .btn {
            padding: 12px 22px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.18);
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { border-color: #00e5ff; color: #00e5ff; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>三体杀</h1>
        <div class="sub">✦ 关于 ✦</div>
        <div class="panel">
            <h2>关于</h2>
            <p class="placeholder">内容筹备中</p>
        </div>
        <a class="btn" href="/lobby">返回入口</a>
    </div>
    <script src="/static/app.js"></script>
    <script>
        TBK.requireLogin();
    </script>
</body>
</html>
