<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌌 三体杀 - 登录</title>
    <style>
        /* 重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 页面整体：夜幕向下渐变，右侧放置登录框 */
        body {
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
            font-weight: 600;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6vh 8vw;
            color: #e6f7ff;
            background: linear-gradient(to bottom, #071428 0%, #04151a 48%, #021012 100%);
        }

        /* 微小星星（铺满背景，左侧会有三颗独立闪烁的星）*/
        .stars{
            position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
            background-image:
                radial-gradient(circle at 10px 20px, rgba(255,255,255,0.9) 0 1px, transparent 2px),
                radial-gradient(circle at 40px 70px, rgba(255,255,255,0.8) 0 1px, transparent 2px),
                radial-gradient(circle at 50px 160px, rgba(255,255,255,0.7) 0 1px, transparent 2px),
                radial-gradient(circle at 90px 40px, rgba(255,255,255,0.6) 0 1px, transparent 2px),
                radial-gradient(circle at 130px 80px, rgba(255,255,255,0.9) 0 1px, transparent 2px);
            background-size: 220px 220px; opacity: 0.45; mix-blend-mode: screen;
        }

        /* 三颗可控漂移星：位置由 JS transform 驱动，CSS 仅负责闪烁 */
        .drift-star{
            position: fixed; left: 0; top: 0; border-radius: 50%; pointer-events: none; z-index: 0; display: block;
            background: radial-gradient(circle at 50% 45%, #ffffff 0%, #ffffff 34%, #f8fbff 46%, rgba(245,248,252,0.95) 60%, transparent 100%);
            box-shadow: 0 0 24px rgba(255,255,255,0.9), 0 0 48px rgba(220,235,245,0.25);
            opacity: 0.9; will-change: transform, opacity;
            animation: flicker-opacity 2.8s ease-in-out infinite;
        }
        .drift-star:nth-of-type(1){ width:10px; height:10px; animation-duration: 2.6s; animation-delay: 0.2s; }
        .drift-star:nth-of-type(2){ width:7px; height:7px; animation-duration: 3.6s; animation-delay: 0.6s; }
        .drift-star:nth-of-type(3){ width:12px; height:12px; animation-duration: 4.2s; animation-delay: 1s; }

        @keyframes flicker-opacity {
            0%, 100% { opacity: 0.65; }
            50% { opacity: 1; }
        }

        /* 过渡雾气层：淡淡光晕，放在星空与森林之间，增加层次感 */
        .mist{
            position: fixed; left: 0; right: 0; bottom: 0; height: 52vh; width: 100%; z-index: 1; pointer-events: none;
            background: radial-gradient(60% 40% at 20% 30%, rgba(2,40,50,0.28), rgba(2,20,30,0.12) 30%, transparent 70%),
                        radial-gradient(40% 30% at 60% 60%, rgba(6,30,40,0.18), transparent 60%);
            filter: blur(18px) saturate(120%);
            opacity: 0.85; mix-blend-mode: screen;
            animation: drift 18s linear infinite;
        }

        @keyframes drift{
            0%{ transform: translateX(-6%); }
            50%{ transform: translateX(6%); }
            100%{ transform: translateX(-6%); }
        }

        /* 森林剪影：改为内联 SVG（更尖锐的松树轮廓），放置在页面底部 */
        .forest{
            position: fixed; left: 0; right: 0; bottom: 0; height: 44vh; width: 100%; z-index: 2; pointer-events: none;
            display: block; transform: translateZ(0);
        }
        .forest svg{ width:100%; height:100%; display:block; }
        /* 近景更深，远景更淡，保持夜色氛围 */
        .forest .layer-far{ fill: rgba(6,12,10,0.55); }
        .forest .layer-mid{ fill: rgba(3,6,5,0.75); }
        .forest .layer-near{ fill: rgba(0,0,0,0.95); }

        /* 转场层：太阳与火焰覆盖层 */
        .transition-layer{
            position: fixed;
            inset: 0;
            z-index: 2.5;
            pointer-events: none;
            overflow: hidden;
        }
        #fireCanvas{
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 44vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .heat-haze{
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 80%, rgba(255, 120, 40, 0.35), transparent 70%);
            transition: opacity 2.5s ease;
        }
        .smoke-overlay{
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 50vh;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            background: linear-gradient(to top, rgba(40, 10, 0, 0.55) 0%, rgba(80, 30, 10, 0.2) 40%, transparent 100%);
            transition: opacity 2s ease;
        }
        .solar-rise{
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .sun{
            position: absolute;
            bottom: 0;
            width: min(30vh, 28vw);
            height: min(30vh, 28vw);
            border-radius: 50%;
            transform: translate(-50%, 100%) scale(0.15);
            opacity: 0;
            background: radial-gradient(circle at 32% 28%, #ffffff 0%, #ffe066 12%, #ff7700 38%, #cc2200 68%, transparent 100%);
            box-shadow: 0 0 90px rgba(255, 90, 0, 0.55), 0 0 160px rgba(255, 50, 0, 0.25), inset 0 0 24px rgba(255, 220, 120, 0.6);
            filter: blur(0.3px);
        }
        .sun-1{ left: 22%; width: min(24vh, 22vw); height: min(24vh, 22vw); }
        .sun-2{ left: 78%; width: min(27vh, 24vw); height: min(27vh, 24vw); }
        .sun-3{ left: 50%; width: min(36vh, 32vw); height: min(36vh, 32vw); }
        .sun-rise-active .sun{
            animation: sun-rise-pulse 9s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .sun-rise-active .sun-1{ animation-delay: 0.15s; }
        .sun-rise-active .sun-2{ animation-delay: 0.35s; }
        .sun-rise-active .sun-3{ animation-delay: 0.55s; }
        @keyframes sun-rise-pulse {
            0% { transform: translate(-50%, 100%) scale(0.15); opacity: 0; filter: blur(0.3px); }
            30% { transform: translate(-50%, -28%) scale(1.15); opacity: 1; filter: blur(0.5px); }
            38% { transform: translate(-50%, -35%) scale(1); opacity: 1; }
            48% { transform: translate(-50%, -35%) scale(1.1); box-shadow: 0 0 110px rgba(255, 100, 0, 0.7), 0 0 200px rgba(255, 40, 0, 0.35); }
            58% { transform: translate(-50%, -35%) scale(1); }
            68% { transform: translate(-50%, -35%) scale(1.08); }
            78% { transform: translate(-50%, -35%) scale(1); }
            100% { transform: translate(-50%, -35%) scale(1); opacity: 1; }
        }
        body.scene-transition-start .drift-star{
            animation-play-state: paused;
            transition: filter 0.4s ease, opacity 2s ease;
        }
        body.scene-transition-start .container{ opacity: 0; transition: opacity 1s ease; }
        body.scene-transition-sky{
            background: linear-gradient(to bottom, #ffd4a0 0%, #ff9955 42%, #e85a20 100%);
            transition: background 2.5s ease-in-out;
        }
        body.scene-transition-sky .stars{ opacity: 0; transition: opacity 2.5s ease-in-out 0.1s; }
        body.scene-transition-sky .heat-haze{ opacity: 0.55; }
        body.scene-transition-sky .smoke-overlay{ opacity: 1; }
        .forest svg path,
        .forest svg g path{
            transition: fill 4.5s ease-in-out;
        }
        body.scene-transition-sky .layer-far{ fill: #ff7b30; }
        body.scene-transition-sky .layer-mid{ fill: #d84a1e; }
        body.scene-transition-sky .layer-near{ fill: #7f1204; }
        .forest-burning-active #fireCanvas{ opacity: 1; }
        .forest-burning-fade #fireCanvas{ opacity: 0; }

        /* 转场叙事与跳过 */
        .transition-ui{
            position: fixed;
            left: 50%;
            bottom: 8vh;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .transition-ui.visible{
            opacity: 1;
            pointer-events: auto;
        }
        .transition-caption{
            font-size: 15px;
            letter-spacing: 3px;
            color: rgba(255, 240, 210, 0.85);
            text-shadow: 0 0 20px rgba(255, 120, 0, 0.4);
            margin-bottom: 14px;
            min-height: 22px;
        }
        .transition-skip{
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.35);
            color: rgba(255, 255, 255, 0.65);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: border-color 0.2s, color 0.2s;
        }
        .transition-skip:hover{
            border-color: rgba(255, 200, 120, 0.6);
            color: rgba(255, 230, 180, 0.95);
        }

        /* 登录框：右侧，硬边科幻风格 + 激光边框 */
        .container{
            position: relative;
            z-index: 3;
            width: 100%; max-width: 420px;
            margin-right: 6vw;
            padding: 40px 36px;
            border-radius: 0;
            background: rgba(8, 14, 20, 0.08);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid rgba(0,200,255,0.32);
            box-shadow: 0 0 30px rgba(0,180,220,0.16), inset 0 0 1px rgba(0,230,255,0.12), inset 0 0 20px rgba(0,150,200,0.04);
            overflow: visible;
        }
        /* 激光边框发光效果 */
        .container::before{
            content: '';
            position: absolute; inset: -2px; border-radius: 0; z-index: -1;
            background: linear-gradient(90deg, rgba(0,200,255,0.2), rgba(0,150,220,0.1), rgba(0,200,255,0.2));
            filter: blur(8px);
            opacity: 0.6;
            animation: laser-glow 3s ease-in-out infinite;
        }

        @keyframes laser-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .title{ font-size: 30px; font-weight: 900; letter-spacing: 2px; text-align: left; color: #7fd9ff; }
        .subtitle{ font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 20px; text-align: left; }

        .tabs{ display:flex; gap:8px; margin-bottom:18px; }
        .tabs button{ flex: none; padding:8px 14px; border-radius:0; border:1px solid rgba(0,200,255,0.12); background: rgba(0,150,200,0.04); color: rgba(150,200,230,0.8); cursor:pointer; font-weight:700; transition: all 0.2s; }
        .tabs button.active{ background: rgba(0,200,255,0.12); color: #a8d8ff; border-color: rgba(0,200,255,0.24); }
        .tabs button:hover{ border-color: rgba(0,200,255,0.2); }

        .form-panel{ display: none; flex-direction: column; gap:14px; }
        .form-panel.active{ display:flex; }
        .form-panel label{ font-size:13px; color: rgba(180,200,220,0.8); font-weight: 600; }
        /* 输入框：直角、细直线边框 */
        .form-panel input{
            padding:12px 14px; border-radius:0; border:1px solid rgba(0,180,220,0.16);
            background: rgba(0,50,80,0.3); color:#b8d8ff; font-size:15px; outline:none; font-weight: 500;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-panel input:focus{
            box-shadow: 0 0 12px rgba(0,180,220,0.12), inset 0 0 1px rgba(0,200,255,0.16);
            border-color: rgba(0,200,255,0.28);
            background: rgba(0,80,120,0.25);
        }
        .form-panel input::placeholder{ color: rgba(150,180,210,0.4); }

        .password-row{ position: relative; }
        .password-row input{ width:100%; padding-right:46px; }
        .password-toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; border:none; color: #7fa8d8; cursor:pointer; font-size:20px; font-weight: 700; letter-spacing: -2px; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .password-toggle.hidden::after{ content: ''; position: absolute; width: 3px; height: 32px; background: currentColor; transform: rotate(-45deg); }

        .form-panel button{ padding:12px; border-radius:0; border:1px solid rgba(0,180,220,0.24); background: rgba(0,150,200,0.24); color:#a8d8ff; font-weight:800; cursor:pointer; transition: all 0.2s; }
        .form-panel button:hover{ background: rgba(0,180,220,0.32); border-color: rgba(0,200,255,0.32); box-shadow: 0 0 12px rgba(0,150,200,0.12); }

        .message{ text-align:left; font-size:14px; margin-top:8px; min-height:20px; color: rgba(160,180,200,0.8); }
        .message.success{ color:#6ad8ff; }
        .message.error{ color:#ff8888; }

        .hint-text{ font-size:13px; color: rgba(140,170,200,0.5); text-align:left; margin-top:6px; }

        /* 面板角标：小装饰线条，增加科幻感 */
        .panel-badge{
            position: absolute; top: 12px; left: 12px; width: 44px; height: 20px; z-index: 6; pointer-events: none;
            display: flex; gap:6px; align-items:center;
        }
        .panel-badge .bar{ height:1px; background: rgba(0,200,255,0.2); box-shadow: 0 0 8px rgba(0,180,220,0.08); border-radius:0; }
        .panel-badge .bar.short{ width:12px; opacity:0.9; }
        .panel-badge .bar.long{ width:28px; opacity:0.7; }
        /* 小角标右下：微小矩形装饰线 */
        .panel-badge::after{ content: ''; position: absolute; right:-8px; bottom:-6px; width:8px; height:8px; border-radius:0; background: rgba(0,180,220,0.16); box-shadow: 0 0 6px rgba(0,150,200,0.08); }

        /* 响应式：窄屏居中显示 */
        @media (max-width: 900px){
            body{ justify-content:center; padding:6vh 6vw; }
            .container{ margin:0; max-width:460px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .drift-star, .mist, .container::before { animation: none !important; }
            .sun-rise-active .sun { animation-duration: 0.01ms !important; animation-delay: 0s !important; }
            body, .stars, .forest svg path, .forest svg g path, #fireCanvas, .heat-haze, .smoke-overlay {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="drift-star" data-l="8vw" data-t="20vh" aria-hidden="true"></div>
        <div class="drift-star" data-l="6vw" data-t="34vh" aria-hidden="true"></div>
        <div class="drift-star" data-l="11vw" data-t="46vh" aria-hidden="true"></div>
    </div>
    <!-- 过渡雾气层，位于星空与森林之间 -->
    <div class="mist" aria-hidden="true"></div>
    <!-- 内联 SVG 森林剪影（AI 生成） -->
    <div class="forest" aria-hidden="true">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 远景山丘 -->
            <path class="layer-far" d="M0,200 C80,160 160,180 240,152 C320,124 400,160 480,148 C560,136 640,176 720,152 C800,128 880,156 960,140 C1040,124 1120,160 1200,148 C1280,136 1360,160 1440,140 L1440,320 L0,320 Z" />
            <!-- 中景：稀疏的松树轮廓 -->
            <g class="layer-mid">
                <path d="M40 220 L70 170 L88 188 L76 166 L100 166 L86 142 L110 160 L128 130 L146 166 L160 150 L174 186 L200 160 L220 190 L240 168 L260 202 L280 180 L300 206 L330 170 L360 200 L390 166 L420 198 L450 170 L480 200 L500 180 L520 208 L560 180 L600 210 L640 180 L680 210 L720 182 L760 210 L800 180 L840 212 L880 178 L920 210 L960 182 L1000 212 L1040 180 L1080 208 L1120 178 L1160 210 L1200 182 L1240 210 L1280 184 L1320 212 L1360 188 L1400 216 L1440 190 L1440 320 L0 320 Z"/>
            </g>
            <!-- 近景：尖锐松树群，形成剪影边缘 -->
            <g class="layer-near">
                <path d="M0 260 L28 220 L48 240 L44 210 L68 240 L82 204 L108 238 L122 200 L150 238 L168 204 L196 244 L220 200 L244 246 L268 206 L296 252 L320 200 L344 254 L372 210 L400 260 L428 210 L452 258 L480 208 L508 260 L540 212 L572 266 L600 214 L632 272 L660 212 L692 276 L720 216 L752 280 L780 220 L812 284 L840 224 L872 288 L900 228 L932 292 L960 234 L992 298 L1020 236 L1052 300 L1080 240 L1112 304 L1140 244 L1172 308 L1200 248 L1232 312 L1260 256 L1292 316 L1320 260 L1352 320 L0 320 Z"/>
            </g>
        </svg>
    </div>
    <div class="transition-layer" aria-hidden="true">
        <div class="heat-haze"></div>
        <canvas id="fireCanvas"></canvas>
        <div class="smoke-overlay"></div>
        <div class="solar-rise" id="solarRise">
            <div class="sun sun-1"></div>
            <div class="sun sun-2"></div>
            <div class="sun sun-3"></div>
        </div>
    </div>
    <div class="transition-ui" id="transitionUi" aria-live="polite">
        <div class="transition-caption" id="transitionCaption"></div>
        <button type="button" class="transition-skip" id="transitionSkip">跳过动画</button>
    </div>
    <div class="container">
        <div class="panel-badge" aria-hidden="true">
            <div class="bar short"></div>
            <div class="bar long"></div>
        </div>
        <div class="title">三体杀</div>
        <div class="subtitle">✦ 黑暗森林 · 在线对决 ✦</div>

        <div class="tabs">
            <button id="loginTab" class="active">登录</button>
            <button id="registerTab">注册</button>
        </div>

        <!-- 登录面板 -->
        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="loginPassword" placeholder="输入密码" />
                <button type="button" class="password-toggle" data-target="loginPassword" aria-label="显示密码">👁</button>
            </div>
            <button id="loginBtn">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <!-- 注册面板 -->
        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
                <button type="button" class="password-toggle" data-target="regPassword" aria-label="显示密码">👁</button>
            </div>
            <label>确认密码</label>
            <div class="password-row">
                <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
                <button type="button" class="password-toggle" data-target="regPasswordConfirm" aria-label="显示密码">👁</button>
            </div>
            <button id="registerBtn">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const messageEl = document.getElementById('message');

        // Tab 切换
        document.getElementById('loginTab').addEventListener('click', () => {
            setTab('login');
        });
        document.getElementById('registerTab').addEventListener('click', () => {
            setTab('register');
        });

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        // 登录
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            await doRequest('/api/login', username, password, '登录成功！');
        });

        // 注册
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();

            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }

            const btn = url === '/api/login' ?
                document.getElementById('loginBtn') :
                document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        // ✅ 登录成功：优先使用服务端返回的 username，确保和后端保持一致
                        const loginUsername = data.username || username;
                        localStorage.setItem('username', loginUsername);
                        setAuthCookie(loginUsername);
                        startSceneTransition();
                    } else {
                        // ✅ 注册成功：清空注册表单，切到登录面板
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function setAuthCookie(username) {
            // 说明：当前使用前端 JS 设置 Cookie，适合演示和开发调试。
            // 若后续要提升安全性，建议改为由后端在登录成功时通过 Set-Cookie 响应头设置 HttpOnly Cookie。
            document.cookie = `username=${encodeURIComponent(username)}; path=/; max-age=3600; SameSite=Lax`;
        }

        document.querySelectorAll('.password-toggle').forEach((button) => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                if (isPassword) {
                    button.classList.remove('hidden');
                    button.setAttribute('aria-label', '隐藏密码');
                } else {
                    button.classList.add('hidden');
                    button.setAttribute('aria-label', '显示密码');
                }
            });
        });

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        let activeTimeline = null;

        class SceneTimeline {
            constructor() {
                this.timeouts = [];
                this.cancelled = false;
            }

            schedule(ms, fn) {
                const id = setTimeout(() => {
                    if (!this.cancelled) fn();
                }, ms);
                this.timeouts.push(id);
            }

            cancel() {
                this.cancelled = true;
                this.timeouts.forEach(clearTimeout);
                this.timeouts = [];
            }
        }

        function finishTransition() {
            sessionStorage.setItem('fromSceneTransition', '1');
            window.location.href = '/lobby';
        }

        function cleanupTransition() {
            if (activeTimeline) activeTimeline.cancel();
            if (window.stopStarLoop) window.stopStarLoop();
            if (window.stopFire) window.stopFire(true);
        }

        function showTransitionUi(caption) {
            const ui = document.getElementById('transitionUi');
            const cap = document.getElementById('transitionCaption');
            if (cap && caption) cap.textContent = caption;
            ui?.classList.add('visible');
        }

        function setTransitionCaption(text) {
            const cap = document.getElementById('transitionCaption');
            if (cap) cap.textContent = text;
        }

        function skipTransition() {
            cleanupTransition();
            finishTransition();
        }

        document.getElementById('transitionSkip')?.addEventListener('click', skipTransition);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.classList.contains('scene-transition-start')) {
                skipTransition();
            }
        });

        function startSceneTransition() {
            if (prefersReducedMotion) {
                finishTransition();
                return;
            }

            cleanupTransition();
            activeTimeline = new SceneTimeline();
            const tl = activeTimeline;

            document.body.classList.add('scene-transition-start');
            document.querySelector('.container')?.setAttribute('aria-hidden', 'true');
            showTransitionUi('星轨偏移……');

            tl.schedule(0, () => {
                if (window.startStarDrop) window.startStarDrop();
            });

            tl.schedule(2200, () => {
                setTransitionCaption('三日凌空');
                document.getElementById('solarRise')?.classList.add('sun-rise-active');
            });

            tl.schedule(3000, () => {
                document.body.classList.add('scene-transition-sky');
            });

            tl.schedule(4200, () => {
                setTransitionCaption('森林在燃烧');
                document.body.classList.add('forest-burning-active');
                if (window.startFire) window.startFire();
            });

            tl.schedule(9800, () => {
                document.body.classList.add('forest-burning-fade');
                if (window.stopFire) window.stopFire(false);
            });

            tl.schedule(10200, () => {
                if (window.stopStarLoop) window.stopStarLoop();
                finishTransition();
            });
        }

        // 按回车键触发登录/注册
        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        // ✅ 如果已经登录过，自动跳转到大厅
        const savedUser = localStorage.getItem('username');
        const cookieUser = document.cookie
            .split(';')
            .map(c => c.trim())
            .find(c => c.startsWith('username='));

        let cookieUsername = '';
        if (cookieUser) {
            try {
                cookieUsername = decodeURIComponent(cookieUser.split('=').slice(1).join('='));
            } catch (err) {
                cookieUsername = '';
            }
        }

        if (savedUser && savedUser === cookieUsername) {
            window.location.href = '/lobby';
        } else if (savedUser && savedUser !== cookieUsername) {
            localStorage.removeItem('username');
        }
    </script>
    <script>
        (function () {
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            if (!stars.length) return;

            const container = document.querySelector('.container');
            const vw = () => window.innerWidth / 100;
            const vh = () => window.innerHeight / 100;
            function rand(min, max) { return Math.random() * (max - min) + min; }

            function parseAnchor(el) {
                const lRaw = el.getAttribute('data-l') || '8vw';
                const tRaw = el.getAttribute('data-t') || '20vh';
                const x = lRaw.endsWith('vw') ? parseFloat(lRaw) * vw() : parseFloat(lRaw);
                const y = tRaw.endsWith('vh') ? parseFloat(tRaw) * vh() : parseFloat(tRaw);
                return { x, y };
            }

            function applyTransform(el, x, y, scale, opacity) {
                el.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(${scale})`;
                if (opacity !== undefined) el.style.opacity = String(opacity);
            }

            class Walker {
                constructor(el) {
                    this.el = el;
                    this.minX = Math.max(2 * vw(), 8);
                    const containerLeft = container ? container.getBoundingClientRect().left : window.innerWidth - 140;
                    this.maxX = Math.max(this.minX + 20, containerLeft - 60);
                    this.minY = 6 * vh();
                    this.maxY = 88 * vh();
                    this.durationMin = rand(2000, 4500);
                    this.durationMax = rand(5000, 14000);
                    this.dropMode = false;
                    this.frozen = false;
                    const anchor = parseAnchor(el);
                    this.x = anchor.x;
                    this.y = anchor.y;
                    applyTransform(el, this.x, this.y, 1);
                    this.setNewTarget();
                }

                setNewTarget() {
                    this.startX = this.x;
                    this.startY = this.y;
                    this.targetX = rand(this.minX, this.maxX);
                    this.targetY = rand(this.minY, this.maxY);
                    this.duration = rand(this.durationMin, this.durationMax);
                    this.startTime = 0;
                }

                step(ts) {
                    if (this.frozen) return;
                    if (!this.startTime) this.startTime = ts;

                    if (this.dropMode) {
                        const t = Math.min((ts - this.startTime) / this.duration, 1);
                        const ease = t * t;
                        const curY = this.startY + (this.targetY - this.startY) * ease;
                        const scale = 1 + t * 0.6;
                        applyTransform(this.el, this.startX, curY, scale, Math.max(0, 1 - t * 0.9));
                        if (t >= 1) this.frozen = true;
                        return;
                    }

                    const t = Math.min((ts - this.startTime) / this.duration, 1);
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    this.x = this.startX + (this.targetX - this.startX) * ease;
                    this.y = this.startY + (this.targetY - this.startY) * ease;
                    applyTransform(this.el, this.x, this.y, 1);

                    if (t >= 1) {
                        this.durationMin = rand(1800, 5000);
                        this.durationMax = rand(4000, 16000);
                        this.setNewTarget();
                    }
                }
            }

            let walkers = stars.map((s) => new Walker(s));
            let loopActive = true;
            let starDropStarted = false;
            let transitionActive = false;

            function startStarDrop() {
                if (starDropStarted) return;
                starDropStarted = true;
                transitionActive = true;
                walkers.forEach((walker, i) => {
                    walker.dropMode = true;
                    walker.startX = walker.x;
                    walker.startY = walker.y;
                    walker.targetX = walker.x;
                    walker.targetY = window.innerHeight + 120;
                    walker.duration = 2200 + i * 180;
                    walker.startTime = 0;
                });
            }

            function stopStarLoop() {
                loopActive = false;
                walkers.forEach((w) => { w.frozen = true; });
            }

            function onResize() {
                if (transitionActive) return;
                walkers = stars.map((s) => new Walker(s));
            }

            window.startStarDrop = startStarDrop;
            window.stopStarLoop = stopStarLoop;
            window.addEventListener('resize', onResize);

            function loop(ts) {
                if (loopActive) {
                    walkers.forEach((w) => w.step(ts));
                    requestAnimationFrame(loop);
                }
            }

            requestAnimationFrame(loop);
        })();
    </script>
    <script>
        (function () {
            const canvas = document.getElementById('fireCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width = 0;
            let height = 0;
            let rafId = null;
            let lastTime = 0;
            let running = false;
            const particles = [];
            const pool = [];
            let fireIntensity = 0;

            function rand(min, max) { return Math.random() * (max - min) + min; }

            function resizeCanvas() {
                const rect = canvas.getBoundingClientRect();
                width = rect.width;
                height = rect.height;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = Math.round(width * dpr);
                canvas.height = Math.round(height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function createParticle() {
                if (particles.length >= 160) return null;
                const p = pool.pop() || {};
                p.x = width * rand(0.12, 0.88);
                p.y = height - rand(4, 22);
                p.vx = rand(-0.4, 0.4);
                p.vy = -rand(0.8, 2.4);
                p.size = rand(5, 18);
                p.age = 0;
                p.life = rand(1.4, 2.6);
                p.drift = rand(-0.3, 0.3);
                p.hot = Math.random() > 0.6;
                return p;
            }

            function updateParticles(dt) {
                const rate = 38 + fireIntensity * 18;
                const spawn = Math.round(rate * dt);
                for (let i = 0; i < spawn; i++) {
                    const particle = createParticle();
                    if (particle) particles.push(particle);
                }
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.age += dt;
                    p.vy += 0.1 * dt;
                    p.x += (p.vx + p.drift * (0.5 + fireIntensity)) * 14;
                    p.y += p.vy * 14;
                    const alpha = Math.max(0, 1 - p.age / p.life);
                    if (p.age >= p.life || p.y < -50 || alpha <= 0) {
                        particles.splice(i, 1);
                        pool.push(p);
                    }
                }
            }

            function drawParticle(p) {
                const progress = p.age / p.life;
                const radius = p.size * (0.7 + progress * 1.5);
                const alpha = Math.max(0, 1 - progress) * fireIntensity;
                ctx.globalAlpha = alpha * (p.hot ? 0.95 : 0.75);
                ctx.fillStyle = p.hot ? '#ffcc55' : '#ff5500';
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }

            function render() {
                ctx.clearRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'lighter';
                particles.forEach(drawParticle);
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
            }

            function loopFire(ts) {
                if (!running) return;
                if (!lastTime) lastTime = ts;
                const dt = Math.min((ts - lastTime) / 1000, 0.033);
                lastTime = ts;
                updateParticles(dt);
                render();
                rafId = requestAnimationFrame(loopFire);
            }

            function startFire() {
                if (running) return;
                running = true;
                fireIntensity = 0;
                resizeCanvas();
                lastTime = 0;
                const start = performance.now();
                const ramp = (time) => {
                    if (!running) return;
                    fireIntensity = Math.min(1, (time - start) / 2500);
                    if (fireIntensity < 1) requestAnimationFrame(ramp);
                };
                requestAnimationFrame(ramp);
                rafId = requestAnimationFrame(loopFire);
            }

            function stopFire(immediate) {
                running = false;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = null;
                if (immediate) {
                    ctx.clearRect(0, 0, width, height);
                    particles.length = 0;
                }
            }

            window.startFire = startFire;
            window.stopFire = stopFire;
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        })();
    </script>
</body>
