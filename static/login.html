<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 登录</title>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/motion.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            font-weight: 500;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 6vh 8vw;
            color: var(--ink);
            background: linear-gradient(to bottom, var(--bg-void) 0%, #041018 52%, #02080c 100%);
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star-dot {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 4px rgba(255,255,255,0.5);
            pointer-events: none;
            will-change: opacity, filter, transform;
        }
        .star-dot.mode-fade {
            transition: opacity 1.5s ease, filter 1.5s ease, transform 1.5s ease;
        }
        .star-dot.mode-fade.out {
            opacity: 0 !important;
            filter: brightness(0);
            transform: scale(0.4);
        }
        .star-dot.mode-snap {
            transition: opacity 0.1s linear, filter 0.18s ease, transform 0.18s ease;
        }
        .star-dot.mode-snap.flash {
            filter: brightness(3.2);
            transform: scale(1.85);
            box-shadow: 0 0 10px rgba(255,255,255,1);
        }
        .star-dot.mode-snap.out {
            opacity: 0 !important;
            filter: brightness(0);
            transform: scale(0.15);
            transition: opacity 0.08s linear, filter 0.08s linear, transform 0.08s linear;
        }

        .drift-star {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 50% 45%, #fff 0%, #fff 40%, transparent 100%);
            box-shadow: 0 0 22px rgba(255,255,255,0.85), 0 0 56px rgba(200,220,235,0.22);
            animation: star-flicker ease-in-out infinite;
            will-change: left, top, opacity;
        }
        .drift-star:nth-of-type(1) { width: 9px; height: 9px; animation-duration: 5.2s; }
        .drift-star:nth-of-type(2) { width: 6px; height: 6px; animation-duration: 7s; animation-delay: 0.4s; }
        .drift-star:nth-of-type(3) { width: 11px; height: 11px; animation-duration: 8.2s; animation-delay: 0.8s; }
        .drift-star.dropping {
            animation: none;
            transition: opacity 0.4s ease;
        }
        @keyframes star-flicker {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 0.95; }
        }

        .forest-clearing {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 38vh;
            z-index: 2;
            pointer-events: none;
        }
        .forest-clearing svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .forest-clearing .layer-far { fill: rgba(6, 10, 14, 0.55); }
        .forest-clearing .layer-mid { fill: rgba(2, 4, 6, 0.82); }
        .forest-clearing .layer-near { fill: #000; }

        .coord-flash {
            position: fixed;
            left: 50%;
            top: 34%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.28em;
            color: rgba(200, 220, 235, 0.4);
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .coord-flash.show { opacity: 1; }

        .meteor {
            position: fixed;
            left: 0;
            top: 0;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.95);
            will-change: transform, opacity;
        }
        .meteor::before {
            content: '';
            position: absolute;
            right: 50%;
            top: 50%;
            width: 80px;
            height: 2px;
            transform: translateY(-50%) rotate(45deg);
            transform-origin: right center;
            background: linear-gradient(90deg, transparent 0%, rgba(230,240,250,0.12) 45%, rgba(255,255,255,0.9) 100%);
        }
        .meteor.fly {
            opacity: 1;
            animation: meteor-fall 1.7s cubic-bezier(0.22, 0.05, 0.45, 1) forwards;
        }
        @keyframes meteor-fall {
            0% { opacity: 0; transform: translate(8vw, 4vh); filter: blur(0.6px); }
            10% { opacity: 0.9; filter: blur(0.2px); }
            75% { opacity: 1; filter: blur(0); transform: translate(50vw, 62vh); }
            100% { opacity: 0; filter: blur(0); transform: translate(55vw, 72vh); }
        }

        /* Oppenheimer-style exposure blast */
        .blast-exposure {
            position: fixed;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            background:
                radial-gradient(ellipse 55% 50% at 55% 72%, rgba(255,255,255,0.95) 0%, rgba(240,244,248,0.45) 28%, transparent 62%),
                rgba(236, 240, 244, 0);
            mix-blend-mode: screen;
        }
        .blast-exposure.climb {
            animation: exposure-climb 0.65s ease-in forwards;
        }
        .blast-exposure.hold {
            opacity: 1;
            background: #f7f8f9;
            mix-blend-mode: normal;
            animation: none;
        }
        .blast-exposure.afterimage {
            animation: exposure-after 0.85s ease-in forwards;
        }
        @keyframes exposure-climb {
            0% {
                opacity: 0.15;
                background:
                    radial-gradient(ellipse 30% 28% at 55% 72%, rgba(255,255,255,0.55) 0%, transparent 55%),
                    rgba(220, 226, 232, 0.05);
            }
            100% {
                opacity: 1;
                background:
                    radial-gradient(ellipse 90% 80% at 55% 72%, #fff 0%, #f4f6f8 35%, rgba(236,240,244,0.92) 70%),
                    rgba(245, 247, 248, 0.98);
            }
        }
        @keyframes exposure-after {
            0% { opacity: 1; background: #f7f8f9; }
            45% { opacity: 1; background: #c8ccd0; }
            100% { opacity: 1; background: #000; }
        }

        .blast-grain {
            position: fixed;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }
        .blast-grain.on {
            animation: grain-pulse 1.5s ease-out forwards;
        }
        @keyframes grain-pulse {
            0% { opacity: 0; }
            25% { opacity: 0.12; }
            70% { opacity: 0.08; }
            100% { opacity: 0; }
        }

        .void-veil {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            background: #000;
            transition: opacity 0.25s ease;
        }
        .void-veil.on { opacity: 1; }

        body[data-scene] .container {
            opacity: 0;
            pointer-events: none;
        }
        body[data-scene="start"] .drift-star {
            animation-play-state: paused;
        }
        body[data-scene="void"] { background: #000; }

        .container {
            position: relative;
            z-index: 4;
            width: 100%;
            max-width: 420px;
            margin-right: 6vw;
            padding: 40px 36px;
            border-radius: 0;
            background: rgba(8, 12, 20, 0.55);
            backdrop-filter: blur(12px) saturate(110%);
            -webkit-backdrop-filter: blur(12px) saturate(110%);
            border: 1px solid var(--line-strong);
            overflow: visible;
            transition: opacity 0.9s ease;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: var(--ink);
        }
        .subtitle {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 20px;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
        .tabs button {
            flex: none;
            padding: 8px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--ink-dim);
            cursor: pointer;
            font-weight: 600;
            font-family: var(--font-ui);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .tabs button.active {
            background: var(--accent-ice-glow);
            color: var(--accent-ice-bright);
            border-color: var(--accent-ice);
        }
        .tabs button:hover {
            border-color: var(--accent-ice);
            color: var(--accent-ice-bright);
        }

        .form-panel { display: none; flex-direction: column; gap: 14px; }
        .form-panel.active { display: flex; }
        .form-panel label { font-size: 13px; color: var(--ink-dim); font-weight: 600; }
        .form-panel input {
            padding: 12px 14px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: var(--bg-inset);
            color: var(--ink);
            font-size: 15px;
            outline: none;
            font-family: var(--font-ui);
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel input:focus {
            border-color: var(--accent-ice);
            background: rgba(8, 16, 24, 0.7);
        }
        .form-panel input::placeholder { color: var(--ink-muted); }

        .password-row { position: relative; }
        .password-row input { width: 100%; padding-right: 46px; }
        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--accent-ice);
            cursor: pointer;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        .password-toggle.hidden::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 32px;
            background: currentColor;
            transform: rotate(-45deg);
        }

        .form-panel button[id$="Btn"] {
            padding: 12px;
            border-radius: 0;
            border: 1px solid var(--line-strong);
            background: var(--accent-ice-dim);
            color: var(--ink);
            font-weight: 700;
            font-family: var(--font-ui);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-panel button[id$="Btn"]:hover {
            background: rgba(122, 158, 176, 0.32);
            border-color: var(--accent-ice);
        }

        .message {
            text-align: left;
            font-size: 14px;
            margin-top: 8px;
            min-height: 20px;
            color: var(--ink-dim);
        }
        .message.success { color: var(--ok); }
        .message.error { color: #c87878; }
        .hint-text {
            font-size: 13px;
            color: var(--ink-muted);
            text-align: left;
            margin-top: 6px;
        }

        .panel-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 44px;
            height: 20px;
            z-index: 6;
            pointer-events: none;
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .panel-badge .bar { height: 1px; background: var(--line-strong); }
        .panel-badge .bar.short { width: 12px; }
        .panel-badge .bar.long { width: 28px; opacity: 0.7; }
        .panel-badge::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: -6px;
            width: 8px;
            height: 8px;
            background: var(--accent-ice-dim);
        }

        @media (max-width: 900px) {
            body { justify-content: center; padding: 6vh 6vw; }
            .container { margin: 0; max-width: 460px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .meteor.fly,
            .blast-exposure.climb,
            .blast-exposure.afterimage,
            .blast-grain.on,
            .drift-star { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="stars" id="starField" aria-hidden="true">
        <div class="drift-star" data-l="8vw" data-t="18vh"></div>
        <div class="drift-star" data-l="6vw" data-t="32vh"></div>
        <div class="drift-star" data-l="12vw" data-t="44vh"></div>
    </div>

    <div class="meteor" id="meteor" aria-hidden="true"></div>

    <div class="forest-clearing" aria-hidden="true">
        <svg id="forestSvg" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="coord-flash" id="coordFlash" aria-hidden="true"></div>
    <div class="blast-exposure" id="blastExposure" aria-hidden="true"></div>
    <div class="blast-grain" id="blastGrain" aria-hidden="true"></div>
    <div class="void-veil" id="voidVeil" aria-hidden="true"></div>

    <div class="container">
        <div class="panel-badge" aria-hidden="true">
            <div class="bar short"></div>
            <div class="bar long"></div>
        </div>
        <div class="title">三体杀</div>
        <div class="subtitle">Dark Forest · Sign in</div>

        <div class="tabs">
            <button id="loginTab" class="active" type="button">登录</button>
            <button id="registerTab" type="button">注册</button>
        </div>

        <div id="loginPanel" class="form-panel active">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="输入用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="loginPassword" placeholder="输入密码" />
                <button type="button" class="password-toggle hidden" data-target="loginPassword" aria-label="显示密码">👁</button>
            </div>
            <button id="loginBtn" type="button">登录</button>
            <div class="hint-text">还没有账号？点击「注册」加入</div>
        </div>

        <div id="registerPanel" class="form-panel">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="设置用户名" />
            <label>密码</label>
            <div class="password-row">
                <input type="password" id="regPassword" placeholder="设置密码（至少3位）" />
                <button type="button" class="password-toggle hidden" data-target="regPassword" aria-label="显示密码">👁</button>
            </div>
            <label>确认密码</label>
            <div class="password-row">
                <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" />
                <button type="button" class="password-toggle hidden" data-target="regPasswordConfirm" aria-label="显示密码">👁</button>
            </div>
            <button id="registerBtn" type="button">注册</button>
            <div class="hint-text">已有账号？点击「登录」返回</div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const login_animation = true;
        const messageEl = document.getElementById('message');

        document.getElementById('loginTab').addEventListener('click', () => setTab('login'));
        document.getElementById('registerTab').addEventListener('click', () => setTab('register'));

        function setTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
            messageEl.textContent = '';
            messageEl.className = 'message';
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            await doRequest(
                '/api/login',
                document.getElementById('loginUsername').value.trim(),
                document.getElementById('loginPassword').value.trim(),
                '登录成功！'
            );
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            if (password !== confirm) {
                showMessage('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 3) {
                showMessage('密码至少3位', 'error');
                return;
            }
            await doRequest('/api/register', username, password, '注册成功！请登录');
        });

        async function doRequest(url, username, password, successMsg) {
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }
            const btn = url === '/api/login'
                ? document.getElementById('loginBtn')
                : document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';
            showMessage('', '');
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 10000);
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include',
                    signal: ctrl.signal,
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showMessage(data.message || successMsg, 'success');
                    if (url === '/api/login') {
                        localStorage.setItem('username', data.username || username);
                        if (login_animation) startSceneTransition();
                        else window.location.href = '/lobby';
                    } else {
                        document.getElementById('regUsername').value = '';
                        document.getElementById('regPassword').value = '';
                        document.getElementById('regPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = username;
                        setTab('login');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (err) {
                showMessage(
                    err.name === 'AbortError' ? '请求超时，请检查网络后重试' : '网络错误，请稍后重试',
                    'error'
                );
            } finally {
                clearTimeout(timer);
                btn.disabled = false;
                btn.textContent = url === '/api/login' ? '登录' : '注册';
            }
        }

        function syncPasswordToggle(button) {
            const input = document.getElementById(button.getAttribute('data-target'));
            if (!input) return;
            const isPassword = input.type === 'password';
            button.classList.toggle('hidden', isPassword);
            button.setAttribute('aria-label', isPassword ? '显示密码' : '隐藏密码');
        }
        document.querySelectorAll('.password-toggle').forEach((button) => {
            syncPasswordToggle(button);
            button.addEventListener('click', () => {
                const input = document.getElementById(button.getAttribute('data-target'));
                if (!input) return;
                input.type = input.type === 'password' ? 'text' : 'password';
                syncPasswordToggle(button);
            });
        });

        function showMessage(msg, type) {
            messageEl.textContent = msg;
            messageEl.className = 'message' + (type ? ' ' + type : '');
        }

        function createTimeline() {
            let events = [];
            let startTime = null;
            let rafId = null;
            let nextEventIndex = 0;
            let cancelled = false;
            function at(ms, fn) {
                events.push({ at: ms, fn });
                return api;
            }
            function start() {
                if (startTime !== null) return;
                cancelled = false;
                events.sort((a, b) => a.at - b.at);
                nextEventIndex = 0;
                startTime = performance.now();
                tick(startTime);
            }
            function cancel() {
                cancelled = true;
                if (rafId) cancelAnimationFrame(rafId);
                rafId = null;
                startTime = null;
            }
            function tick(ts) {
                if (cancelled) return;
                const elapsed = ts - startTime;
                while (nextEventIndex < events.length && events[nextEventIndex].at <= elapsed) {
                    try { events[nextEventIndex].fn(); } catch (e) { console.error(e); }
                    nextEventIndex++;
                }
                if (nextEventIndex < events.length) rafId = requestAnimationFrame(tick);
                else rafId = null;
            }
            const api = { at, start, cancel };
            return api;
        }

        /* --- Poisson-ish star scatter --- */
        function seedFieldStars() {
            const field = document.getElementById('starField');
            const placed = [];
            const minDist = 3.2;
            let attempts = 0;
            while (placed.length < 64 && attempts < 4000) {
                attempts++;
                const x = 2 + Math.random() * 96;
                const y = 3 + Math.random() * 52;
                let ok = true;
                for (let i = 0; i < placed.length; i++) {
                    const dx = x - placed[i][0];
                    const dy = (y - placed[i][1]) * 1.15;
                    if (dx * dx + dy * dy < minDist * minDist) {
                        ok = false;
                        break;
                    }
                }
                if (!ok) continue;
                placed.push([x, y]);
            }
            placed.forEach(([x, y], i) => {
                const d = document.createElement('div');
                d.className = 'star-dot';
                d.style.left = x + '%';
                d.style.top = y + '%';
                const size = Math.random() < 0.12 ? 2.3 : (Math.random() < 0.35 ? 1.7 : 1.2);
                d.style.width = size + 'px';
                d.style.height = size + 'px';
                d.style.opacity = String(0.25 + Math.random() * 0.55);
                d.classList.add(Math.random() < 0.42 ? 'mode-fade' : 'mode-snap');
                field.appendChild(d);
            });
        }
        seedFieldStars();

        /* --- Recursive conifer silhouette generator --- */
        function mulberry32(a) {
            return function () {
                let t = (a += 0x6d2b79f5);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function coniferPath(cx, baseY, height, rng) {
            const pts = [];
            const tipX = cx + (rng() - 0.5) * height * 0.04;
            const tipY = baseY - height;
            pts.push([cx - height * 0.04, baseY]);
            pts.push([cx + height * 0.04, baseY]);

            const tiers = 5 + Math.floor(rng() * 3);
            for (let t = 0; t < tiers; t++) {
                const u = t / (tiers - 1);
                const y = baseY - height * (0.12 + u * 0.78);
                const half = height * (0.28 - u * 0.22) * (0.85 + rng() * 0.3);
                const lean = (rng() - 0.5) * half * 0.15;
                pts.push([cx + half + lean, y + height * 0.02]);
                /* needle fringe */
                const needles = 3 + Math.floor(rng() * 3);
                for (let n = 0; n < needles; n++) {
                    const ny = y - (n + 1) * (height * 0.035);
                    const nw = half * (0.72 - n * 0.08);
                    pts.push([cx + nw * (0.9 + rng() * 0.15), ny]);
                    pts.push([cx + nw * 0.55, ny - height * 0.01]);
                }
            }
            pts.push([tipX, tipY]);
            for (let t = tiers - 1; t >= 0; t--) {
                const u = t / (tiers - 1);
                const y = baseY - height * (0.12 + u * 0.78);
                const half = height * (0.28 - u * 0.22) * (0.85 + rng() * 0.3);
                const lean = (rng() - 0.5) * half * 0.15;
                pts.push([cx - half + lean, y + height * 0.02]);
            }

            let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
            for (let i = 1; i < pts.length; i++) {
                d += ` L ${pts[i][0].toFixed(1)} ${pts[i][1].toFixed(1)}`;
            }
            return d + ' Z';
        }

        function buildForest() {
            const svg = document.getElementById('forestSvg');
            svg.innerHTML = '';
            const rng = mulberry32(0x3b71c0de ^ (Date.now() & 0xfff));

            const ridge = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            ridge.setAttribute('class', 'layer-far');
            ridge.setAttribute('d', 'M0,230 C180,205 360,220 540,200 C720,180 900,215 1080,195 C1260,175 1380,200 1440,190 L1440,360 L0,360 Z');
            svg.appendChild(ridge);

            function plantLayer(cls, count, y0, hMin, hMax, spacingJitter) {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', cls);
                let x = -20;
                for (let i = 0; i < count; i++) {
                    x += 28 + rng() * spacingJitter;
                    if (x > 1460) break;
                    const h = hMin + rng() * (hMax - hMin);
                    const y = y0 + rng() * 12;
                    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    p.setAttribute('d', coniferPath(x, y, h, rng));
                    g.appendChild(p);
                }
                svg.appendChild(g);
            }

            plantLayer('layer-far', 22, 250, 55, 90, 55);
            plantLayer('layer-mid', 28, 275, 70, 115, 42);
            plantLayer('layer-near', 34, 300, 85, 140, 36);
        }
        buildForest();

        function dropBigStars(done) {
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            let left = stars.length;
            if (!left) {
                done();
                return;
            }
            stars.forEach((el, idx) => {
                el.classList.add('dropping');
                const cs = getComputedStyle(el);
                const startX = parseFloat(cs.left);
                const startY = parseFloat(cs.top);
                const endY = window.innerHeight + 40;
                const duration = 1600 + idx * 180;
                const t0 = performance.now();
                function step(ts) {
                    const t = Math.min(1, (ts - t0) / duration);
                    const ease = t * t;
                    el.style.left = startX + 'px';
                    el.style.top = (startY + (endY - startY) * ease) + 'px';
                    el.style.opacity = String(Math.max(0, 1 - t * 1.05));
                    if (t < 1) {
                        requestAnimationFrame(step);
                    } else {
                        el.style.display = 'none';
                        left -= 1;
                        if (left <= 0) done();
                    }
                }
                requestAnimationFrame(step);
            });
        }

        function startSceneTransition() {
            const goLobby = () => {
                try { sessionStorage.setItem('tbk_enter', 'void'); } catch (e) {}
                window.location.href = '/lobby';
            };

            const container = document.querySelector('.container');
            if (container) {
                container.setAttribute('aria-hidden', 'true');
                let live = document.getElementById('transition-announcer');
                if (!live) {
                    live = document.createElement('div');
                    live.id = 'transition-announcer';
                    live.setAttribute('aria-live', 'assertive');
                    live.setAttribute('role', 'status');
                    live.style.cssText = 'position:fixed;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);';
                    document.body.appendChild(live);
                }
                live.textContent = '登录成功，正在前往大厅...';
            }

            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.body.dataset.scene = 'start';
                setTimeout(goLobby, 400);
                return;
            }

            document.body.dataset.scene = 'start';
            if (window.stopStarDrift) window.stopStarDrift();

            const timeline = createTimeline();
            const coord = document.getElementById('coordFlash');
            const meteor = document.getElementById('meteor');
            const blast = document.getElementById('blastExposure');
            const grain = document.getElementById('blastGrain');
            const voidEl = document.getElementById('voidVeil');

            /* Phase A: big stars fall below horizon, then small-star kill */
            timeline.at(0, () => {
                dropBigStars(() => {
                    document.body.dataset.scene = 'extinguish';
                    const dots = Array.from(document.querySelectorAll('.star-dot'));
                    const fades = dots.filter((d) => d.classList.contains('mode-fade'));
                    const snaps = dots.filter((d) => d.classList.contains('mode-snap'));

                    /* shuffle */
                    const shuffle = (arr) => {
                        for (let i = arr.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [arr[i], arr[j]] = [arr[j], arr[i]];
                        }
                        return arr;
                    };
                    shuffle(fades);
                    shuffle(snaps);

                    const killTimeline = createTimeline();
                    /* some fades first as bed */
                    fades.forEach((el, i) => {
                        killTimeline.at(80 + i * 70, () => el.classList.add('out'));
                    });
                    /* rhythmic snaps */
                    snaps.forEach((el, i) => {
                        const at = 400 + i * (95 + Math.floor(Math.random() * 55));
                        killTimeline.at(at, () => el.classList.add('flash'));
                        killTimeline.at(at + 140, () => {
                            el.classList.remove('flash');
                            el.classList.add('out');
                        });
                    });

                    const snapEnd = 400 + snaps.length * 150 + 200;
                    killTimeline.at(Math.max(snapEnd, fades.length * 70 + 900), () => {
                        /* continue main narrative */
                        const a = Math.floor(Math.random() * 90 + 10);
                        const b = Math.floor(Math.random() * 900 + 100);
                        const c = Math.floor(Math.random() * 900 + 100);
                        coord.textContent = `α · ${a}.${b} · ${c}`;
                        coord.classList.add('show');
                        setTimeout(() => {
                            coord.classList.remove('show');
                            coord.textContent = '';
                        }, 380);

                        setTimeout(() => {
                            document.body.dataset.scene = 'meteor';
                            meteor.classList.add('fly');
                        }, 500);

                        setTimeout(() => {
                            meteor.classList.remove('fly');
                            meteor.style.opacity = '0';
                            document.body.dataset.scene = 'blast';
                            blast.classList.add('climb');
                            grain.classList.add('on');
                        }, 500 + 1700);

                        setTimeout(() => {
                            blast.classList.remove('climb');
                            blast.classList.add('hold');
                        }, 500 + 1700 + 650);

                        setTimeout(() => {
                            blast.classList.remove('hold');
                            blast.classList.add('afterimage');
                        }, 500 + 1700 + 650 + 420);

                        setTimeout(() => {
                            document.body.dataset.scene = 'void';
                            voidEl.classList.add('on');
                            blast.classList.remove('afterimage', 'climb', 'hold');
                            blast.style.opacity = '0';
                            grain.classList.remove('on');
                        }, 500 + 1700 + 650 + 420 + 850);

                        setTimeout(() => {
                            const announcer = document.getElementById('transition-announcer');
                            if (announcer) announcer.remove();
                            goLobby();
                        }, 500 + 1700 + 650 + 420 + 850 + 900);
                    });
                    killTimeline.start();
                });
            });

            timeline.start();
            window._sceneTimeline = timeline;
        }

        document.getElementById('loginPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPasswordConfirm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        (async () => {
            if (!localStorage.getItem('username')) return;
            try {
                const res = await fetch('/api/rooms', { credentials: 'include' });
                if (res.ok) window.location.href = '/lobby';
                else localStorage.removeItem('username');
            } catch (e) { /* stay */ }
        })();

        window.addEventListener('beforeunload', () => {
            if (window._sceneTimeline) window._sceneTimeline.cancel();
        });
    </script>
    <script>
        (function () {
            const stars = Array.from(document.querySelectorAll('.drift-star'));
            if (!stars.length) return;
            const container = document.querySelector('.container');
            const vw = () => window.innerWidth / 100;
            const vh = () => window.innerHeight / 100;
            const rand = (a, b) => Math.random() * (b - a) + a;
            let running = true;

            stars.forEach((el) => {
                el.style.left = el.getAttribute('data-l') || '8vw';
                el.style.top = el.getAttribute('data-t') || '18vh';
            });

            class Walker {
                constructor(el) {
                    this.el = el;
                    this.minX = Math.max(2 * vw(), 8);
                    const containerLeft = container
                        ? container.getBoundingClientRect().left
                        : window.innerWidth - 140;
                    this.maxX = Math.max(this.minX + 20, containerLeft - 60);
                    this.minY = 5 * vh();
                    this.maxY = 48 * vh();
                    const cs = getComputedStyle(el);
                    this.baseX = parseFloat(cs.left) || this.minX + 20;
                    this.baseY = parseFloat(cs.top) || this.minY + 20;
                    this.setNewTarget();
                }
                setNewTarget() {
                    this.startX = this.baseX;
                    this.startY = this.baseY;
                    this.targetX = rand(this.minX, this.maxX);
                    this.targetY = rand(this.minY, this.maxY);
                    this.duration = rand(4500, 12000);
                    this.startTime = undefined;
                }
                step(ts) {
                    if (!this.startTime) this.startTime = ts;
                    const t = Math.min((ts - this.startTime) / this.duration, 1);
                    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                    const curX = this.startX + (this.targetX - this.startX) * ease;
                    const curY = this.startY + (this.targetY - this.startY) * ease;
                    this.el.style.left = curX + 'px';
                    this.el.style.top = curY + 'px';
                    if (t >= 1) {
                        this.baseX = curX;
                        this.baseY = curY;
                        this.setNewTarget();
                    }
                }
            }

            const walkers = stars.map((s) => new Walker(s));
            window.stopStarDrift = () => { running = false; };
            function loop(ts) {
                if (!running) return;
                walkers.forEach((w) => w.step(ts));
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
