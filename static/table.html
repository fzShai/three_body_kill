<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 桌面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, #1a3050 0%, #0a121c 55%, #05080e 100%);
            color: #e8f4ff;
            padding: 20px 12px 32px;
        }
        .wrap { max-width: 960px; margin: 0 auto; }
        h1 { font-size: 22px; color: #7fd9ff; margin-bottom: 4px; }
        .meta { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 280px; gap: 14px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
        .panel {
            background: rgba(10, 20, 34, 0.78);
            border: 1px solid rgba(0, 200, 255, 0.16);
            border-radius: 12px;
            padding: 14px;
        }
        .panel h2 { font-size: 13px; color: rgba(160,200,230,0.65); margin-bottom: 10px; letter-spacing: 1px; }
        .players { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .player-chip {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 120px;
            background: rgba(0,40,70,0.35);
        }
        .player-chip.turn { border-color: #00e5ff; box-shadow: 0 0 12px rgba(0,229,255,0.2); }
        .player-chip.dying-victim { border-color: #ff8a8a; box-shadow: 0 0 12px rgba(255,120,120,0.25); }
        .player-chip.dying-current { border-color: #ffcc66; box-shadow: 0 0 12px rgba(255,200,100,0.25); }
        .player-chip.dead { opacity: 0.4; }
        .player-chip.offline { opacity: 0.65; border-color: rgba(255,120,120,0.35); }
        .banner.dying {
            background: rgba(255, 100, 80, 0.14); border-color: rgba(255,120,100,0.4);
        }
        .card.dim { opacity: 0.35; cursor: not-allowed; }
        .badge-off { font-size: 11px; color: #ff8a8a; margin-left: 4px; }
        .player-chip .n { font-weight: 700; font-size: 14px; }
        .player-chip .s { font-size: 12px; color: rgba(200,220,240,0.55); margin-top: 4px; }
        .player-chip .eq, .player-chip .st {
            margin-top: 6px; font-size: 11px; line-height: 1.4;
            color: rgba(180,210,230,0.55);
        }
        .player-chip .eq .filled { color: #9fd9ff; }
        .player-chip .st .pos { color: #8fd9a8; }
        .player-chip .st .neg { color: #ff9a8a; }
        .role {
            display: inline-block; margin-bottom: 10px;
            padding: 8px 12px; border-radius: 6px;
            background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.22);
            font-size: 13px;
        }
        .mode-hint {
            font-size: 12px; color: rgba(180,210,230,0.65); margin-bottom: 8px; min-height: 18px;
        }
        .hand { display: flex; flex-wrap: wrap; gap: 8px; min-height: 110px; }
        .card {
            width: 118px; min-height: 140px; padding: 10px;
            border-radius: 8px; cursor: pointer;
            background: linear-gradient(160deg, rgba(20,40,70,0.95), rgba(10,20,36,0.95));
            border: 1px solid rgba(0,200,255,0.28);
            transition: transform 0.15s, border-color 0.15s;
        }
        .card:hover { transform: translateY(-4px); border-color: #00e5ff; }
        .card.selected { border-color: #ffcc66; box-shadow: 0 0 14px rgba(255,200,100,0.25); }
        .card .cname { font-weight: 800; font-size: 13px; color: #9fdfff; margin-bottom: 6px; }
        .card .ctype { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
        .card .ctext { font-size: 11px; color: rgba(220,230,240,0.7); line-height: 1.35; }
        .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }
        .btn {
            padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
            background: linear-gradient(135deg, #00e5ff, #0077ff); color: #fff; font-weight: 700; font-size: 13px;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline {
            background: transparent; border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.7);
        }
        select {
            padding: 10px 12px; border-radius: 8px;
            background: rgba(0,40,60,0.5); color: #cfefff;
            border: 1px solid rgba(0,180,220,0.25);
        }
        .log {
            font-size: 12px; color: rgba(200,220,240,0.6);
            max-height: 280px; overflow-y: auto; line-height: 1.5;
        }
        .log div { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .status { margin-top: 10px; font-size: 13px; color: rgba(180,210,230,0.7); }
        .status.error { color: #ff8a8a; }
        .banner {
            margin-bottom: 12px; padding: 12px; border-radius: 8px;
            background: rgba(255, 180, 60, 0.12); border: 1px solid rgba(255,180,60,0.3);
            display: none;
        }
        .banner.show { display: block; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>黑暗森林 · 对局桌</h1>
        <div class="meta">房号 <span id="roomIdDisplay"></span> · 阶段 <span id="phaseLabel">—</span> · 弃牌堆 <span id="discardCount">0</span> · 倒计时 <span id="turnTimer">—</span></div>
        <div class="banner" id="endBanner"></div>

        <div class="grid">
            <div>
                <div class="panel" style="margin-bottom:14px;">
                    <h2>战场</h2>
                    <div class="players" id="players"></div>
                </div>
                <div class="panel">
                    <h2>你的身份</h2>
                    <div class="role" id="roleBox">—</div>
                    <h2>手牌</h2>
                    <div class="mode-hint" id="modeHint"></div>
                    <div class="hand" id="hand"></div>
                    <div class="row">
                        <label style="font-size:12px;color:rgba(255,255,255,0.45);">目标</label>
                        <select id="targetSelect"></select>
                        <button class="btn" id="playBtn">出牌</button>
                        <button class="btn btn-outline" id="endPlayBtn">结束出牌</button>
                        <button class="btn btn-outline" id="discardDoneBtn">完成弃牌</button>
                        <button class="btn btn-outline" id="techDiscardBtn">弃置升科技</button>
                        <button class="btn btn-outline" id="techConfirmBtn" style="display:none;">确认升科技</button>
                        <button class="btn btn-outline" id="techCancelBtn" style="display:none;">取消</button>
                        <button class="btn btn-outline" id="respondPassBtn" style="display:none;">不响应</button>
                        <span id="choiceBtns" style="display:none;"></span>
                        <button class="btn btn-outline" id="wanderAcceptBtn" style="display:none;">发动流浪</button>
                        <button class="btn btn-outline" id="wanderPassBtn" style="display:none;">放弃流浪</button>
                        <button class="btn btn-outline" id="dyingPassBtn" style="display:none;">结算濒死</button>
                        <button class="btn btn-outline" id="recastBtn">重铸</button>
                    </div>
                    <div class="status" id="statusMsg"></div>
                </div>
            </div>
            <div class="panel">
                <h2>战报</h2>
                <div class="log" id="log"></div>
                <div class="row" style="margin-top:14px;">
                    <a class="btn btn-outline" href="/lobby" id="backLobbyLink" style="text-decoration:none;">回大厅</a>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
    <script>
        const username = TBK.requireLogin();
        const roomId = TBK.roomIdFromPathOrQuery();
        if (!username) {}
        else if (!roomId) { window.location.href = '/lobby'; }
        else {
            document.getElementById('roomIdDisplay').textContent = roomId;
            let state = null;
            let selectedId = null;
            let selectedIds = new Set();
            let uiMode = 'play'; // play | discard | tech_discard
            let turnDeadlineMs = null;
            let lastTargetValue = null;
            const statusMsg = document.getElementById('statusMsg');
            const turnTimerEl = document.getElementById('turnTimer');

            function setStatus(text, kind) {
                statusMsg.textContent = text || '';
                statusMsg.className = 'status' + (kind ? ' ' + kind : '');
            }

            const SLOT_LABEL = {
                stellar_track: '恒星航迹',
                stability_system: '维稳系统',
                ship: '船',
                armor: '甲',
                temp_ascend: '临时飞升',
            };

            const TEMP_ASCEND_IDS = new Set(['nano_center', 'chip_workshop', 'stars_plan']);

            function needsOtherTarget(card) {
                const ids = new Set([
                    'ladder_plan', 'ball_lightning', 'sophon', 'wallfacer_plan', 'broadcast',
                    'toxic_water', 'four_dimension', 'deadline', 'dual_vector', 'soap',
                    'great_ravine', 'killer_52', 'reckoning', 'finale',
                ]);
                return card && (
                    card.subtype === 'kill'
                    || card.id === 'kill_low' || card.id === 'kill_high' || card.id === 'kill_t3'
                    || ids.has(card.id)
                );
            }

            function isPeach(card) {
                return card && (card.subtype === 'heal' || card.id === 'peach');
            }

            function isBasic(card) {
                if (!card) return false;
                if (['kill', 'dodge', 'heal', 'visitor'].includes(card.subtype)) return true;
                return card.id === 'peach' || card.id === 'visitor';
            }

            const ASCENSION_LABEL = {
                mech: '机械飞升',
                cyber: '义体飞升',
                gene: '基因飞升',
                psychic: '灵能飞升',
            };

            function equipLine(equipment, slot) {
                const card = equipment && equipment[slot];
                const label = SLOT_LABEL[slot] || slot;
                if (card && card.name) {
                    return `<div class="filled">${label}：${card.name}</div>`;
                }
                return `<div>${label}：空</div>`;
            }

            function cardTypeLabel(c) {
                if (c.subtype === 'kill') return `${c.tier || '?'}阶杀`;
                if (c.subtype === 'dodge') return `${c.tier || '?'}阶闪`;
                if (c.subtype === 'heal') return `桃 · 回复${c.heal || 2}`;
                if (c.subtype === 'visitor') return '基本 · 天外来客';
                if (TEMP_ASCEND_IDS.has(c.id) || c.slot === 'temp_ascend') return '临时飞升';
                if (c.type === 'equipment') return `装备 · ${SLOT_LABEL[c.slot] || c.slot || ''}`;
                return c.type || '牌';
            }

            function statusLines(statuses) {
                const list = statuses || [];
                const pos = list.filter((s) => s.kind === 'positive').map((s) => s.name);
                const neg = list.filter((s) => s.kind === 'negative').map((s) => s.name);
                return `<div class="pos">正面：${pos.length ? pos.join('、') : '无'}</div><div class="neg">负面：${neg.length ? neg.join('、') : '无'}</div>`;
            }

            function syncUiMode(snap) {
                const myTurn = snap.current_player === username && snap.phase === 'turn';
                if (!myTurn || snap.phase !== 'turn') {
                    uiMode = 'play';
                    selectedIds.clear();
                    return;
                }
                if (snap.turn_phase === 'discard') {
                    if (uiMode !== 'discard') {
                        selectedIds.clear();
                        selectedId = null;
                    }
                    uiMode = 'discard';
                    return;
                }
                if (snap.turn_phase === 'play' && uiMode === 'discard') {
                    uiMode = 'play';
                    selectedIds.clear();
                }
                if (snap.turn_phase !== 'play' && uiMode === 'tech_discard') {
                    uiMode = 'play';
                    selectedIds.clear();
                }
            }

            function discardNeed(snap) {
                const you = snap.you || {};
                const handCount = (you.hand || []).length;
                const limit = you.hand_limit ?? handCount;
                return Math.max(0, handCount - limit);
            }

            setInterval(() => {
                if (!turnDeadlineMs || !state || !['turn', 'prompt', 'dying'].includes(state.phase)) {
                    turnTimerEl.textContent = '—';
                    return;
                }
                const left = Math.max(0, Math.ceil((turnDeadlineMs - Date.now()) / 1000));
                turnTimerEl.textContent = left + 's';
            }, 200);

            function render(snap) {
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'C',location:'table.html:render:entry',message:'render called',data:{hasSnap:!!snap,phase:snap&&snap.phase,handLen:(snap&&snap.you&&snap.you.hand||[]).length,hasRole:!!(snap&&snap.you&&snap.you.role),logLen:(snap&&snap.log||[]).length,players:(snap&&snap.players||[]).length},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                try {
                state = snap;
                turnDeadlineMs = snap.turn_deadline_ms || null;
                syncUiMode(snap);
                document.getElementById('discardCount').textContent = snap.discard_count ?? 0;
                const phaseMap = { turn: '回合', prompt: '响应', dying: '濒死', ended: '结束' };
                const tp = snap.turn_phase ? ({ draw: '摸牌', play: '出牌', discard: '弃牌' }[snap.turn_phase] || snap.turn_phase) : '';
                document.getElementById('phaseLabel').textContent = (phaseMap[snap.phase] || snap.phase) + (tp ? '/' + tp : '');

                const prompt = snap.prompt;
                const dying = snap.dying;
                const isPrompt = snap.phase === 'prompt' && prompt;
                const isDying = snap.phase === 'dying' && dying;
                const myTurn = snap.current_player === username && snap.phase === 'turn';
                const myPrompt = isPrompt && prompt.to === username;
                // NOTE: intentionally leave isWander/myWander undefined to reproduce bug — do not define here yet
                const isChoice = isPrompt && prompt.type === 'choice';
                const isInterrupt = isPrompt && (prompt.type === 'interrupt_trick' || prompt.type === 'respond_toxic');
                const myChoice = isChoice && prompt.to === username;
                const myInterrupt = isInterrupt && prompt.to === username;
                const myDying = isDying && dying.victim === username;
                const canSaveDying = isDying && snap.you?.alive !== false;
                const inPlay = myTurn && snap.turn_phase === 'play';
                const inDiscard = myTurn && snap.turn_phase === 'discard';
                const need = discardNeed(snap);
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'A',location:'table.html:render:beforeHint',message:'about to touch myWander',data:{willRefMyWander:true},timestamp:Date.now()})}).catch(()=>{});
                // #endregion

                const hint = document.getElementById('modeHint');
                if (uiMode === 'tech_discard') {
                    hint.textContent = `弃置升科技：已选 ${selectedIds.size}/4 张基本牌`;
                } else if (inDiscard) {
                    hint.textContent = need > 0
                        ? `弃牌阶段：还需弃置 ${need} 张（已选 ${selectedIds.size}）`
                        : '手牌已达上限，可点击「完成弃牌」';
                } else if (myWander) {
                    hint.textContent = '【流浪】：是否失去 1 点体力并摸两张牌？';
                } else if (isDying) {
                    hint.textContent = myDying
                        ? '你濒死：打出桃自救，或点击「结算濒死」'
                        : `${dying.victim} 濒死：可打出桃救人`;
                } else if (inPlay) {
                    hint.textContent = '出牌阶段：点选手牌后出牌；可弃置 4 张基本牌升科技';
                } else {
                    hint.textContent = '';
                }

                const playersEl = document.getElementById('players');
                playersEl.innerHTML = (snap.players || []).map((p) => {
                    const cls = [
                        (!isPrompt && !isDying && p.username === snap.current_player) ? 'turn' : '',
                        (isDying && p.username === dying.victim) ? 'dying-victim' : '',
                        (isPrompt && p.username === prompt.to) ? 'dying-current' : '',
                        p.alive ? '' : 'dead',
                        p.online === false ? 'offline' : '',
                    ].filter(Boolean).join(' ');
                    const vis = p.vision_exposed ? ' · 视野暴露' : '';
                    const sealed = p.skills_sealed ? ' · 非锁定技失效' : '';
                    const asc = p.ascension ? ` · ${ASCENSION_LABEL[p.ascension] || p.ascension}` : '';
                    return `<div class="player-chip ${cls}">
                        <div class="n">${p.username}${p.username === username ? ' (你)' : ''}${p.online === false ? '<span class="badge-off">离线</span>' : ''}</div>
                        <div class="s">HP ${p.hp}/${p.max_hp} · 科技${p.tech_level ?? 1} · 手牌 ${p.hand_count}${vis}${sealed}${asc}${p.alive ? '' : ' · 出局'}</div>
                        <div class="eq">${equipLine(p.equipment, 'ship')}${equipLine(p.equipment, 'armor')}</div>
                        <div class="st">${statusLines(p.statuses)}</div>
                    </div>`;
                }).join('');

                const role = snap.you?.role;
                const you = snap.you || {};
                const skillText = (role?.skills || []).map((s) =>
                    `${s.locked ? '【锁定】' : ''}${s.name}`
                ).join(' · ');
                const sealedYou = you.skills_sealed ? ' · 非锁定技失效' : '';
                document.getElementById('roleBox').innerHTML = role
                    ? `${role.role_name} · HP ${you.hp} · 科技${you.tech_level ?? 1} · 手牌上限${you.hand_limit ?? '—'}${sealedYou}`
                        + (skillText ? `<div style="margin-top:6px;opacity:0.75;font-size:12px;">${skillText}</div>` : '')
                    : '—';

                const hand = you.hand || [];
                const handEl = document.getElementById('hand');
                const multiSelect = uiMode === 'discard' || uiMode === 'tech_discard';
                handEl.innerHTML = hand.map((c) => {
                    let dim = '';
                    if (isWander) dim = 'dim';
                    else if (isPrompt) dim = c.subtype === 'dodge' ? '' : 'dim';
                    if (isDying) dim = (c.subtype === 'heal' || c.id === 'peach') ? '' : 'dim';
                    if (uiMode === 'tech_discard' && !isBasic(c)) dim = 'dim';
                    const selected = multiSelect
                        ? selectedIds.has(c.instance_id)
                        : selectedId === c.instance_id;
                    return `<div class="card ${selected ? 'selected' : ''} ${dim}" data-id="${c.instance_id}" data-subtype="${c.subtype || ''}" data-card-id="${c.id || ''}">
                        <div class="cname">${c.name}</div>
                        <div class="ctype">${cardTypeLabel(c)}</div>
                        <div class="ctext">${c.text || ''}</div>
                    </div>`;
                }).join('') || '<div style="color:rgba(255,255,255,0.25);font-size:13px;">无手牌</div>';
                handEl.querySelectorAll('.card').forEach((el) => {
                    el.addEventListener('click', () => {
                        if (el.classList.contains('dim')) return;
                        const id = el.getAttribute('data-id');
                        if (uiMode === 'discard') {
                            if (selectedIds.has(id)) selectedIds.delete(id);
                            else selectedIds.add(id);
                            selectedId = null;
                            render(state);
                            return;
                        }
                        if (uiMode === 'tech_discard') {
                            const card = hand.find((c) => c.instance_id === id);
                            if (!isBasic(card)) return;
                            if (selectedIds.has(id)) selectedIds.delete(id);
                            else if (selectedIds.size < 4) selectedIds.add(id);
                            selectedId = null;
                            render(state);
                            return;
                        }
                        selectedId = id;
                        selectedIds.clear();
                        render(state);
                    });
                });

                const sel = document.getElementById('targetSelect');
                const selectedCard = hand.find((c) => c.instance_id === selectedId);
                const others = (snap.players || []).filter((p) => p.alive && p.username !== username);
                const ladderTargets = others.filter((p) => !p.vision_exposed);
                let options = '';
                if (isDying && isPeach(selectedCard)) {
                    options = `<option value="${dying.victim}">${myDying ? '自己（自救）' : dying.victim + '（救人）'}</option>`;
                } else if (isPeach(selectedCard)) {
                    options = `<option value="${username}">自己</option>`;
                } else if (selectedCard && selectedCard.id === 'ladder_plan') {
                    options = '<option value="">（选择目标）</option>' +
                        ladderTargets.map((p) => `<option value="${p.username}">${p.username}</option>`).join('');
                } else if (needsOtherTarget(selectedCard)) {
                    options = '<option value="">（选择目标）</option>' +
                        others.map((p) => `<option value="${p.username}">${p.username}</option>`).join('');
                } else {
                    options = '<option value="">（无需目标）</option>' +
                        others.map((p) => `<option value="${p.username}">${p.username}</option>`).join('');
                }
                sel.innerHTML = options;
                if (lastTargetValue && [...sel.options].some((o) => o.value === lastTargetValue)) {
                    sel.value = lastTargetValue;
                } else if (isDying && isPeach(selectedCard)) {
                    sel.value = dying.victim;
                } else if (isPeach(selectedCard)) {
                    sel.value = username;
                }
                sel.disabled = !(inPlay || myPrompt || canSaveDying) || uiMode === 'tech_discard' || uiMode === 'discard';
                sel.onchange = () => { lastTargetValue = sel.value; };

                const canPlay = ((inPlay && uiMode === 'play') || (myPrompt && !isWander) || canSaveDying) && selectedId;
                document.getElementById('playBtn').disabled = !canPlay;
                document.getElementById('playBtn').textContent =
                    inDiscard ? '弃置所选' : (uiMode === 'tech_discard' ? '—' : (isDying && !myDying ? '救人' : (isDying ? '自救' : '出牌')));
                if (inDiscard) {
                    document.getElementById('playBtn').disabled = selectedIds.size === 0;
                    document.getElementById('playBtn').textContent = '弃置所选';
                }

                document.getElementById('endPlayBtn').disabled = !(inPlay && uiMode === 'play');
                document.getElementById('endPlayBtn').style.display = (inDiscard || uiMode === 'tech_discard' || isWander) ? 'none' : '';

                const discardDoneBtn = document.getElementById('discardDoneBtn');
                discardDoneBtn.style.display = inDiscard ? '' : 'none';
                discardDoneBtn.disabled = !(inDiscard && need === 0);

                const techDiscardBtn = document.getElementById('techDiscardBtn');
                const techConfirmBtn = document.getElementById('techConfirmBtn');
                const techCancelBtn = document.getElementById('techCancelBtn');
                techDiscardBtn.style.display = (inPlay && uiMode === 'play') ? '' : 'none';
                techDiscardBtn.disabled = !inPlay;
                techConfirmBtn.style.display = uiMode === 'tech_discard' ? '' : 'none';
                techCancelBtn.style.display = uiMode === 'tech_discard' ? '' : 'none';
                techConfirmBtn.disabled = !(uiMode === 'tech_discard' && selectedIds.size === 4);

                document.getElementById('recastBtn').disabled = !(inPlay && uiMode === 'play' && selectedId);
                document.getElementById('recastBtn').style.display = (inDiscard || uiMode === 'tech_discard' || isWander) ? 'none' : '';

                const respondPassBtn = document.getElementById('respondPassBtn');
                respondPassBtn.style.display = (isPrompt && !isWander && !isChoice) ? 'inline-block' : 'none';
                respondPassBtn.disabled = !(myPrompt || myInterrupt) || isWander || isChoice;
                respondPassBtn.textContent = isInterrupt ? '不响应/不打断' : '不响应';

                const choiceBtns = document.getElementById('choiceBtns');
                if (isChoice && myChoice) {
                    choiceBtns.style.display = 'inline-flex';
                    choiceBtns.style.gap = '8px';
                    choiceBtns.innerHTML = (prompt.options || []).map((o) =>
                        `<button class="btn" data-choice="${o.id}">${o.label}</button>`
                    ).join('');
                    choiceBtns.querySelectorAll('button').forEach((btn) => {
                        btn.addEventListener('click', () => {
                            sock.send('game_action', { action: 'choose', choice: btn.getAttribute('data-choice') }, roomId);
                        });
                    });
                } else {
                    choiceBtns.style.display = 'none';
                    choiceBtns.innerHTML = '';
                }
                const wanderAcceptBtn = document.getElementById('wanderAcceptBtn');
                const wanderPassBtn = document.getElementById('wanderPassBtn');
                wanderAcceptBtn.style.display = isWander ? 'inline-block' : 'none';
                wanderPassBtn.style.display = isWander ? 'inline-block' : 'none';
                wanderAcceptBtn.disabled = !myWander;
                wanderPassBtn.disabled = !myWander;
                const dyingPassBtn = document.getElementById('dyingPassBtn');
                dyingPassBtn.style.display = myDying ? 'inline-block' : 'none';
                dyingPassBtn.disabled = !myDying;

                document.getElementById('log').innerHTML = (snap.log || []).slice().reverse().map((l) => `<div>${l}</div>`).join('');

                const banner = document.getElementById('endBanner');
                banner.classList.remove('dying');
                if (snap.phase === 'ended') {
                    banner.classList.add('show');
                    banner.textContent = snap.winner ? `对局结束 · 胜者 ${snap.winner}` : '对局结束';
                } else if (isChoice) {
                    banner.classList.add('show', 'dying');
                    banner.textContent = `${prompt.to} 请选择：${(prompt.options || []).map((o) => o.label).join(' / ')}`;
                } else if (isInterrupt) {
                    banner.classList.add('show', 'dying');
                    banner.textContent = prompt.type === 'respond_toxic'
                        ? `${prompt.from} 对 ${prompt.to} 使用剧毒之水 · 可用杀/思想钢印响应`
                        : `${prompt.from} 打出${prompt.card_name || '锦囊'} · ${prompt.to} 可打断`;
                } else if (isWander) {
                    banner.classList.add('show', 'dying');
                    banner.textContent = `${prompt.to} 【流浪】：是否失去 1 体力并摸两张牌？`;
                } else if (isPrompt) {
                    banner.classList.add('show', 'dying');
                    banner.textContent = `${prompt.from} 对 ${prompt.to} 使用${prompt.card_name || '杀'} · 等待闪响应`;
                } else if (isDying) {
                    banner.classList.add('show', 'dying');
                    banner.textContent = myDying
                        ? `${dying.victim} 濒死 · 打出桃自救或结算濒死`
                        : `${dying.victim} 濒死 · 可打出桃救人`;
                } else {
                    banner.classList.remove('show');
                }
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'A',location:'table.html:render:success',message:'render finished ok',data:{roleShown:!!(snap.you&&snap.you.role),handLen:(snap.you&&snap.you.hand||[]).length},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                } catch (err) {
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'A',location:'table.html:render:catch',message:String(err&&err.message||err),data:{name:err&&err.name,stack:(err&&err.stack||'').slice(0,300)},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                throw err;
                }
            }

            const sock = new TBK.GameSocket();
            sock.on('game_state', (msg) => {
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'B',location:'table.html:game_state',message:'game_state received',data:{msgRoom:msg.room_id,pageRoom:roomId,filtered:!!(msg.room_id&&msg.room_id!==roomId),handLen:(msg.payload&&msg.payload.you&&msg.payload.you.hand||[]).length,hasRole:!!(msg.payload&&msg.payload.you&&msg.payload.you.role),logLen:(msg.payload&&msg.payload.log||[]).length},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                if (msg.room_id && msg.room_id !== roomId) return;
                setStatus('');
                // Drop selection for cards no longer in hand after server update
                const handIds = new Set((msg.payload?.you?.hand || []).map((c) => c.instance_id));
                if (selectedId && !handIds.has(selectedId)) selectedId = null;
                selectedIds = new Set([...selectedIds].filter((id) => handIds.has(id)));
                render(msg.payload);
            });
            sock.on('error', (msg) => {
                // #region agent log
                fetch('http://127.0.0.1:7458/ingest/e5a47139-64a7-4168-8d28-2940c0a64ab2',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'60d9c6'},body:JSON.stringify({sessionId:'60d9c6',runId:'pre-fix',hypothesisId:'D',location:'table.html:ws_error',message:'ws error',data:{payload:msg.payload||{}},timestamp:Date.now()})}).catch(()=>{});
                // #endregion
                setStatus(msg.payload?.message || '错误', 'error');
            });
            sock.on('game_started', () => sock.send('get_game_state', {}, roomId));
            sock.on('_open', () => sock.send('get_game_state', {}, roomId));
            sock.connect();

            document.getElementById('playBtn').addEventListener('click', () => {
                if (!state) return;
                if (uiMode === 'discard') {
                    const ids = [...selectedIds];
                    if (!ids.length) return;
                    selectedIds.clear();
                    for (const id of ids) {
                        sock.send('game_action', { action: 'discard_card', instance_id: id }, roomId);
                    }
                    return;
                }
                if (!selectedId) return;
                const card = (state.you?.hand || []).find((c) => c.instance_id === selectedId);
                const target = document.getElementById('targetSelect').value || null;
                if (state.phase === 'prompt') {
                    sock.send('game_action', { action: 'respond_dodge', instance_id: selectedId }, roomId);
                } else if (state.phase === 'dying') {
                    sock.send('game_action', { action: 'play_card', instance_id: selectedId }, roomId);
                } else {
                    if (needsOtherTarget(card) && !target) {
                        setStatus('该牌需要选择目标', 'error');
                        return;
                    }
                    const payload = { action: 'play_card', instance_id: selectedId };
                    if (isPeach(card)) {
                        payload.target = username;
                    } else if (target) {
                        payload.target = target;
                    }
                    sock.send('game_action', payload, roomId);
                }
                selectedId = null;
            });
            document.getElementById('endPlayBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'end_play' }, roomId);
            });
            document.getElementById('discardDoneBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'discard_done' }, roomId);
            });
            document.getElementById('techDiscardBtn').addEventListener('click', () => {
                uiMode = 'tech_discard';
                selectedId = null;
                selectedIds.clear();
                if (state) render(state);
            });
            document.getElementById('techConfirmBtn').addEventListener('click', () => {
                if (selectedIds.size !== 4) {
                    setStatus('请选择恰好 4 张基本牌', 'error');
                    return;
                }
                sock.send('game_action', {
                    action: 'discard_for_tech',
                    instance_ids: [...selectedIds],
                }, roomId);
                selectedIds.clear();
                uiMode = 'play';
            });
            document.getElementById('techCancelBtn').addEventListener('click', () => {
                uiMode = 'play';
                selectedIds.clear();
                if (state) render(state);
            });
            document.getElementById('respondPassBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'respond_pass' }, roomId);
            });
            document.getElementById('wanderAcceptBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'wander_accept' }, roomId);
            });
            document.getElementById('wanderPassBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'wander_pass' }, roomId);
            });
            document.getElementById('dyingPassBtn').addEventListener('click', () => {
                sock.send('game_action', { action: 'dying_resolve' }, roomId);
            });
            document.getElementById('recastBtn').addEventListener('click', () => {
                if (!selectedId) return;
                sock.send('game_action', { action: 'recast', instance_id: selectedId }, roomId);
                selectedId = null;
            });
            document.getElementById('backLobbyLink')?.addEventListener('click', () => {
                window.location.href = '/lobby';
            });
        }
    </script>
</body>
</html>
