<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三体杀 - 图鉴</title>
    <link rel="stylesheet" href="/static/css/tokens.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <link rel="stylesheet" href="/static/css/motion.css" />
</head>
<body class="shell-page">
    <div class="wrap">
        <h1 class="brand motion-enter">三体杀</h1>
        <div class="brand-sub motion-enter motion-enter-delay-1">Codex · Archive</div>
        <div class="top-bar motion-enter motion-enter-delay-1">
            <a class="btn btn-outline" href="/lobby">返回入口</a>
        </div>

        <div class="tabs" role="tablist">
            <button class="tab active" type="button" data-tab="roles">角色图鉴</button>
            <button class="tab" type="button" data-tab="cards">卡牌图鉴</button>
            <button class="tab" type="button" data-tab="achievements">成就图鉴</button>
        </div>

        <section class="panel tab-panel active radar-once" id="panel-roles">
            <h2>角色图鉴</h2>
            <div id="rolesList"><div class="empty">加载中…</div></div>
            <div class="status" id="rolesStatus"></div>
        </section>

        <section class="panel tab-panel radar-once" id="panel-cards">
            <h2>卡牌图鉴</h2>
            <div id="cardsList"><div class="empty">加载中…</div></div>
            <div class="status" id="cardsStatus"></div>
        </section>

        <section class="panel tab-panel radar-once" id="panel-achievements">
            <h2>成就图鉴</h2>
            <div class="empty">敬请期待</div>
        </section>
    </div>
    <script src="/static/app.js"></script>
    <script>
        const username = TBK.requireLogin();
        if (username) {
            const TYPE_LABEL = {
                action: '行动',
                attack: '攻击',
                defense: '防御',
                ultimate: '终极',
                equipment: '装备',
                heal: '治疗',
                basic: '基本',
                trick: '锦囊',
            };
            const SLOT_LABEL = {
                stellar_track: '恒星航迹',
                stability_system: '维稳系统',
                ship: '船',
                armor: '甲',
                temp_ascend: '临时飞升',
            };

            document.querySelectorAll('.tab').forEach((tab) => {
                tab.addEventListener('click', () => {
                    const id = tab.getAttribute('data-tab');
                    document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t === tab));
                    document.querySelectorAll('.tab-panel').forEach((p) => {
                        p.classList.toggle('active', p.id === 'panel-' + id);
                    });
                });
            });

            function escapeHtml(s) {
                return String(s ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            async function fetchJson(apiPath, staticPath) {
                try {
                    const { data } = await TBK.api(apiPath);
                    return data;
                } catch (e) {
                    if (e.message === 'unauthorized') throw e;
                }
                const res = await fetch(staticPath, { credentials: 'same-origin' });
                if (!res.ok) throw new Error('load_failed');
                return res.json();
            }

            async function loadRoles() {
                const list = document.getElementById('rolesList');
                const status = document.getElementById('rolesStatus');
                try {
                    const data = await fetchJson('/api/codex/roles', '/static/data/roles.json');
                    const roles = data.roles || [];
                    if (!roles.length) {
                        list.innerHTML = '<div class="empty">暂无角色数据</div>';
                        return;
                    }
                    list.innerHTML = roles.map((r) => {
                        const skills = (r.skills || []).map((s) =>
                            `<div class="text-body">${s.locked ? '【锁定技】' : '【技能】'}${escapeHtml(s.name)}：${escapeHtml(s.text || '')}</div>`
                        ).join('');
                        return `
                        <div class="item">
                            <div class="name">${escapeHtml(r.name)}</div>
                            <div class="meta-line">
                                <span>HP：${escapeHtml(r.hp)}</span>
                            </div>
                            ${skills || '<div class="text-body">暂无技能说明</div>'}
                        </div>`;
                    }).join('');
                } catch (e) {
                    if (e.message !== 'unauthorized') status.textContent = '加载角色图鉴失败';
                }
            }

            async function loadCards() {
                const list = document.getElementById('cardsList');
                const status = document.getElementById('cardsStatus');
                try {
                    const data = await fetchJson('/api/codex/cards', '/static/data/cards.json');
                    let cards = data.cards || [];
                    if (!Array.isArray(cards)) {
                        cards = Object.values(cards);
                    }
                    const ships = data.ships || [];
                    const armors = data.armors || [];
                    const realms = data.realms || [];
                    const extra = [
                        ...ships.map((s) => ({ ...s, type: s.type || 'equipment', slot: s.slot || 'ship' })),
                        ...armors.map((a) => ({ ...a, type: a.type || 'equipment', slot: a.slot || 'armor' })),
                        ...realms.map((r) => ({ ...r, type: r.type || 'trick' })),
                    ];
                    const all = [...cards, ...extra];
                    if (!all.length) {
                        list.innerHTML = '<div class="empty">暂无卡牌数据</div>';
                        return;
                    }
                    list.innerHTML = all.map((c) => {
                        const impl = c.implemented === true ? '已实装' : (c.implemented === false ? '未实装' : '');
                        const needs = (c.needs && c.needs.length) ? `依赖：${c.needs.join('、')}` : '';
                        return `
                        <div class="item">
                            <div class="name">${escapeHtml(c.name)}</div>
                            <div class="meta-line">
                                <span>类型：${escapeHtml(TYPE_LABEL[c.type] || c.type || '—')}</span>
                                ${c.phase ? `<span>批次：${escapeHtml(c.phase)}</span>` : ''}
                                ${c.cost != null ? `<span>费用：${escapeHtml(c.cost)}</span>` : ''}
                                ${c.slot ? `<span>栏位：${escapeHtml(SLOT_LABEL[c.slot] || c.slot)}</span>` : ''}
                                ${impl ? `<span>${escapeHtml(impl)}</span>` : ''}
                                ${needs ? `<span>${escapeHtml(needs)}</span>` : ''}
                            </div>
                            <div class="text-body">${escapeHtml(c.text)}</div>
                        </div>`;
                    }).join('');
                } catch (e) {
                    if (e.message !== 'unauthorized') status.textContent = '加载卡牌图鉴失败';
                }
            }

            loadRoles();
            loadCards();
        }
    </script>
</body>
</html>
